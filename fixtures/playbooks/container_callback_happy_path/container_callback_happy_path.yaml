# Container Tool Callback — happy-path kind-val fixture.
#
# Round 5 of the Container Tool Callback umbrella
# (noetl/ai-meta#43).  Exercises the full chain end-to-end:
#
#   1. Worker creates a K8s Job via `Tool::Container`
#      (noetl-tools v2.21.0, Round 3).
#   2. Pod runs an `alpine` container that `sleep 3 && echo hello`
#      then exits 0.
#   3. noetl-k8s-watcher (noetl/ops k8s-watcher Deployment,
#      Round 1) observes the `Job.Complete` condition and POSTs
#      a terminal-state event to noetl-server's
#      container-callback endpoint.
#   4. noetl-server's handler (v2.48.0, Round 2) accepts the
#      POST and either:
#      - emits a `call.done` event (matches a live execution), OR
#      - bumps `noetl_container_callback_stale_total{state="succeeded"}`
#        if the call.done already arrived from the worker (the
#        transition state until the worker adopts the
#        `pending_callback` marker).
#
# The fixture is intentionally minimal — the Round 5 acceptance
# is "does the chain wire up" not "does it carry production
# payload shape".
apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: container_callback_happy_path
  path: fixtures/playbooks/container_callback_happy_path
  description: |
    Round 5 kind-val: dispatch a trivial container Job, expect
    Complete + watcher callback + playbook reaches completion.

workload: {}

workflow:
  - step: start
    desc: "Initialise the run"
    tool:
      kind: python
      input: {}
      code: |
        result = {"status": "initialized"}
    next:
      spec:
        mode: exclusive
      arcs:
        - step: dispatch_container

  - step: dispatch_container
    desc: "Dispatch a trivial container Job via Tool::Container"
    tool:
      kind: container
      image: alpine:3.19
      # `sleep 3` gives the watcher time to observe the Job
      # transition out of the Pending phase before exiting 0.
      command: ["/bin/sh", "-c"]
      args: ["echo CTC_HAPPY_PATH; sleep 3; echo done"]
      resources:
        requests:
          cpu: "20m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      timeout_seconds: 120
      backoff_limit: 0
      restart_policy: Never
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: "Done"
    tool:
      kind: python
      input: {}
      code: |
        result = {"status": "complete", "fixture": "container_callback_happy_path"}

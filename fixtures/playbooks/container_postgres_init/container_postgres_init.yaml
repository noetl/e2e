# ============================================================================
# KNOWN-SKIP — not in the active regression suite.
#
# Blocker: the container steps run the custom image
# `noetl/postgres-container-test` (build context: this directory's build.sh +
# init_schema.sh / create_tables.sh / seed_data.sh).  That image is NOT present
# in the local kind cluster and is not published to a registry kind can pull,
# so the container Jobs fail ImagePullBackOff.
#
# The DSL below has been modernized to the current `kind: container` syntax
# (flat snake_case config, `env:` as a `[{name, value}]` array — the shape the
# Rust container tool's ContainerConfig deserializes) so the fixture no longer
# carries stale `runtime:`-nested / camelCase drift.  To make it green:
#   1. Build + load the image:  ./build.sh  then
#      `kind load docker-image noetl/postgres-container-test:latest --name noetl`
#   2. Add the path back to CORE_FIXTURES in scripts/rust_regression_run.sh.
# See noetl/e2e RUST_REGRESSION.md "Known-skip fixtures" + the follow-up issue.
# ============================================================================
apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: container_postgres_init
  path: fixtures/playbooks/container_postgres_init

# Enable distributed tracing for observability
tracing:
  enabled: true
  service_name: container_postgres_init
  otlp_endpoint: http://clickhouse.observability.svc.cluster.local:4318
  sample_rate: 1.0

workload:
  pg_auth: pg_k8s  # Use pg_k8s for cluster, pg_local for local testing
  namespace: noetl
  image: noetl/postgres-container-test:latest
  message: "Container-based PostgreSQL schema initialization test"

workflow:
  - step: start
    desc: "Start container-based PostgreSQL initialization"
    tool:
      kind: python
      code: |
        result = {"status": "initialized"}
    next:
      spec:
        mode: exclusive
      arcs:
        - step: verify_postgres_connection

  - step: verify_postgres_connection
    desc: "Verify PostgreSQL connection before container execution"
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        SELECT version();
    next:
      spec:
        mode: exclusive
      arcs:
        - step: run_schema_creation

  - step: run_schema_creation
    desc: "Execute schema creation via container job"
    tool:
      kind: container
      namespace: "{{ namespace }}"
      image: "{{ image }}"
      command: ["/bin/bash", "/workspace/init_schema.sh"]
      service_account: noetl-worker
      backoff_limit: 0
      timeout_seconds: 600
      resources:
        limits:
          cpu: "500m"
          memory: 512Mi
        requests:
          cpu: "100m"
          memory: 128Mi
      env:
        - name: PGHOST
          value: postgres.postgres.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          value: demo_noetl
        - name: PGUSER
          value: "demo"
        - name: PGPASSWORD
          value: "demo"
        - name: EXECUTION_ID
          value: "{{ execution_id }}"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: run_table_creation

  - step: run_table_creation
    desc: "Create test tables via container job with SQL scripts"
    tool:
      kind: container
      namespace: "{{ namespace }}"
      image: "{{ image }}"
      command: ["/bin/bash", "/workspace/create_tables.sh"]
      service_account: noetl-worker
      backoff_limit: 0
      timeout_seconds: 600
      resources:
        limits:
          cpu: "500m"
          memory: 512Mi
        requests:
          cpu: "100m"
          memory: 128Mi
      env:
        - name: PGHOST
          value: postgres.postgres.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          value: demo_noetl
        - name: PGUSER
          value: "demo"
        - name: PGPASSWORD
          value: "demo"
        - name: EXECUTION_ID
          value: "{{ execution_id }}"
        - name: SCHEMA_NAME
          value: container_test
    next:
      spec:
        mode: exclusive
      arcs:
        - step: seed_test_data

  - step: seed_test_data
    desc: "Seed test data via container job"
    tool:
      kind: container
      namespace: "{{ namespace }}"
      image: "{{ image }}"
      command: ["/bin/bash", "/workspace/seed_data.sh"]
      service_account: noetl-worker
      backoff_limit: 0
      timeout_seconds: 600
      resources:
        limits:
          cpu: "500m"
          memory: 512Mi
        requests:
          cpu: "100m"
          memory: 128Mi
      env:
        - name: PGHOST
          value: postgres.postgres.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          value: demo_noetl
        - name: PGUSER
          value: "demo"
        - name: PGPASSWORD
          value: "demo"
        - name: EXECUTION_ID
          value: "{{ execution_id }}"
        - name: SCHEMA_NAME
          value: container_test
    next:
      spec:
        mode: exclusive
      arcs:
        - step: verify_data

  - step: verify_data
    desc: "Verify data was created successfully"
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        SELECT
          schemaname,
          tablename,
          pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) AS size
        FROM pg_tables
        WHERE schemaname = 'container_test'
        ORDER BY tablename;

        SELECT COUNT(*) as customer_count FROM container_test.customers;
        SELECT COUNT(*) as order_count FROM container_test.orders;
        SELECT COUNT(*) as product_count FROM container_test.products;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: cleanup_test_data

  - step: cleanup_test_data
    desc: "Clean up test schema (optional - disable in production)"
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        DROP SCHEMA IF EXISTS container_test CASCADE;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: "Container-based PostgreSQL initialization complete"
    tool:
      kind: python
      code: |
        result = {
            "status": "success",
            "message": "Container-based PostgreSQL initialization complete",
            "schema_created": "container_test"
        }

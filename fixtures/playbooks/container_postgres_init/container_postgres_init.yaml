# ============================================================================
# KNOWN-SKIP — container-based Postgres schema-init fixture (noetl/ai-meta#180).
#
# Image blocker (the original #180 scope) is RESOLVED: build.sh now builds
# `noetl/postgres-container-test:e2e` (podman or docker) and loads it into the
# local kind cluster.  The non-`latest` tag makes Kubernetes default
# `imagePullPolicy` to `IfNotPresent`, so the loaded image is used without a
# registry pull.  To (re)build + load before a run:
#   ./build.sh            # podman/docker build + kind load into cluster `noetl`
# The container steps run and create the schema/tables/seed data against the
# in-cluster Postgres (postgres.postgres.svc.cluster.local, db demo_noetl,
# user demo) — verified when timing allows.
#
# STILL BLOCKED on a container-tool platform bug (tracked in noetl/ai-meta#186):
# a `kind: container` step returns pending_callback (the Job runs async), but
# the orchestrator advances the DAG on that initial success instead of waiting
# for the Job's completion resume.  So the dependent postgres `verify_data`
# step (and each successive container step) races ahead of the prior Job's
# commit and fails with `42P01 relation ... does not exist`.  This cannot be
# fixed in the fixture; it needs an orchestrate-core/worker change.
#
# Two container-tool config bugs surfaced here were worked around at the
# fixture level so the config parses (also folded into #186):
#   * `args: []` on each container step — the worker injects the step input
#     MAP into `args` when absent, which the tool's Vec<String> rejects.
#   * PGPORT dropped + EXECUTION_ID prefixed — the server coerces pure-numeric
#     env string values to JSON numbers, which the tool's String value rejects.
# ============================================================================
apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: container_postgres_init
  path: fixtures/playbooks/container_postgres_init

# Enable distributed tracing for observability
tracing:
  enabled: true
  service_name: container_postgres_init
  otlp_endpoint: http://clickhouse.observability.svc.cluster.local:4318
  sample_rate: 1.0

workload:
  pg_auth: pg_k8s  # Use pg_k8s for cluster, pg_local for local testing
  namespace: noetl
  image: noetl/postgres-container-test:e2e
  message: "Container-based PostgreSQL schema initialization test"

workflow:
  - step: start
    desc: "Start container-based PostgreSQL initialization"
    tool:
      kind: python
      code: |
        result = {"status": "initialized"}
    next:
      spec:
        mode: exclusive
      arcs:
        - step: verify_postgres_connection

  - step: verify_postgres_connection
    desc: "Verify PostgreSQL connection before container execution"
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        SELECT version();
    next:
      spec:
        mode: exclusive
      arcs:
        - step: run_schema_creation

  - step: run_schema_creation
    desc: "Execute schema creation via container job"
    tool:
      kind: container
      namespace: "{{ namespace }}"
      image: "{{ image }}"
      command: ["/bin/bash", "/workspace/init_schema.sh"]
      # Declare args explicitly (empty) so the worker does NOT inject the step
      # input map into `args` — the container tool's ContainerConfig.args is a
      # Vec<String>, and an injected map fails deserialization ("invalid type:
      # map, expected a sequence").  See noetl/ai-meta#186.
      args: []
      service_account: noetl-worker
      backoff_limit: 0
      timeout_seconds: 600
      resources:
        limits:
          cpu: "500m"
          memory: 512Mi
        requests:
          cpu: "100m"
          memory: 128Mi
      env:
        - name: PGHOST
          value: postgres.postgres.svc.cluster.local
        - name: PGDATABASE
          value: demo_noetl
        - name: PGUSER
          value: "demo"
        - name: PGPASSWORD
          value: "demo"
        - name: EXECUTION_ID
          value: "exec-{{ execution_id }}"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: run_table_creation

  - step: run_table_creation
    desc: "Create test tables via container job with SQL scripts"
    tool:
      kind: container
      namespace: "{{ namespace }}"
      image: "{{ image }}"
      command: ["/bin/bash", "/workspace/create_tables.sh"]
      args: []  # see run_schema_creation — avoids worker args-injection (ai-meta#186)
      service_account: noetl-worker
      backoff_limit: 0
      timeout_seconds: 600
      resources:
        limits:
          cpu: "500m"
          memory: 512Mi
        requests:
          cpu: "100m"
          memory: 128Mi
      env:
        - name: PGHOST
          value: postgres.postgres.svc.cluster.local
        - name: PGDATABASE
          value: demo_noetl
        - name: PGUSER
          value: "demo"
        - name: PGPASSWORD
          value: "demo"
        - name: EXECUTION_ID
          value: "exec-{{ execution_id }}"
        - name: SCHEMA_NAME
          value: container_test
    next:
      spec:
        mode: exclusive
      arcs:
        - step: seed_test_data

  - step: seed_test_data
    desc: "Seed test data via container job"
    tool:
      kind: container
      namespace: "{{ namespace }}"
      image: "{{ image }}"
      command: ["/bin/bash", "/workspace/seed_data.sh"]
      args: []  # see run_schema_creation — avoids worker args-injection (ai-meta#186)
      service_account: noetl-worker
      backoff_limit: 0
      timeout_seconds: 600
      resources:
        limits:
          cpu: "500m"
          memory: 512Mi
        requests:
          cpu: "100m"
          memory: 128Mi
      env:
        - name: PGHOST
          value: postgres.postgres.svc.cluster.local
        - name: PGDATABASE
          value: demo_noetl
        - name: PGUSER
          value: "demo"
        - name: PGPASSWORD
          value: "demo"
        - name: EXECUTION_ID
          value: "exec-{{ execution_id }}"
        - name: SCHEMA_NAME
          value: container_test
    next:
      spec:
        mode: exclusive
      arcs:
        - step: verify_data

  - step: verify_data
    desc: "Verify data was created successfully"
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        SELECT
          schemaname,
          tablename,
          pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) AS size
        FROM pg_tables
        WHERE schemaname = 'container_test'
        ORDER BY tablename;

        SELECT COUNT(*) as customer_count FROM container_test.customers;
        SELECT COUNT(*) as order_count FROM container_test.orders;
        SELECT COUNT(*) as product_count FROM container_test.products;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: cleanup_test_data

  - step: cleanup_test_data
    desc: "Clean up test schema (optional - disable in production)"
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        DROP SCHEMA IF EXISTS container_test CASCADE;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: "Container-based PostgreSQL initialization complete"
    tool:
      kind: python
      code: |
        result = {
            "status": "success",
            "message": "Container-based PostgreSQL initialization complete",
            "schema_created": "container_test"
        }

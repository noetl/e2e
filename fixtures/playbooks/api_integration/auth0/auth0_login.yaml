apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: auth0_login
  path: api_integration/auth0/auth0_login
  description: |
    Authenticate user with Auth0 and create NoETL session.

    OPTIMIZED v2: Reduced from 5 steps to 4 steps for faster execution (~200ms).
    - Merged start + validate_token into single step
    - Uses connection pooling for postgres
    - Uses CTE for combined user upsert + session creation
    - Uses inline task lists for callbacks

    Flow:
      1. start: Validate JWT token (merged with entry point)
      2. create_user_session: Upsert user, inherit same-email roles, create session, and return roles
      3. cache_and_callback: Cache session + send callback (inline tasks)
      4. end: Complete

    Gateway Integration:
      - Gateway calls this playbook when user authenticates via Auth0
      - After completion, gateway can fetch session directly from NATS K/V
      - NATS K/V acts as session cache; Postgres is source of truth

    Input:
      - auth0_token: Auth0 ID token (JWT)
      - client_ip: Client IP (optional, defaults to 0.0.0.0)
      - request_id: Gateway request ID for callback

    Output (via callback):
      - session_token: NoETL session token
      - user: User details (user_id, email, display_name)
      - expires_at: Session expiration timestamp
  tags:
    - auth0
    - authentication
    - nats
    - gateway
    - optimized

workload:
  auth0_token: ""
  client_ip: "0.0.0.0"
  auth0_domain: "mestumre-development.us.auth0.com"
  db_credential: pg_auth
  nats_credential: nats_credential
  session_bucket: sessions
  callback_subject: ""
  request_id: ""
  gateway_url: "http://gateway.gateway.svc.cluster.local"

workflow:
  # Step 1: Entry point + JWT validation (merged)
  - step: start
    desc: Validate Auth0 ID token (JWT) - entry point
    tool:
      kind: python
      input:
        auth0_token: "{{ auth0_token }}"
        auth0_domain: "{{ auth0_domain }}"
      code: |
        import base64
        import json
        import time
        import os
        import sys
        import hashlib

        # ── noetl/ai-meta#169: Auth0 RS256 signature verification (drive path) ──
        #
        # This step is the DRIVE fallback used only when NOETL_AUTH_SYNC is off;
        # the live synchronous login path (noetl-server handlers::auth::login)
        # already got JWKS-based RS256 verification in server PR #276.  This block
        # mirrors that behaviour semantically for the playbook path so #169 covers
        # both.
        #
        # Pure Python stdlib ONLY — the worker runtime image (Alpine + python3)
        # ships no PyJWT / cryptography, and default-OFF must add no dependency.
        # RSA verification is `sig^e mod n` compared against the EMSA-PKCS1-v1_5
        # (RFC 8017) padded SHA-256 digest, done with big-int `pow()` + hashlib.
        #
        # Flag NOETL_AUTH_VERIFY_SIGNATURE is tri-state (default off):
        #   off      → verification never runs; result is byte-identical to the
        #              historical claims-only decode below (no JWKS fetch, no new
        #              failure mode, no external dependency exercised).
        #   shadow   → verify + log the would-reject to stderr, but STILL allow
        #              (the canary-observation lever; decision unchanged).
        #   enforce  → a token that fails signature/claims is rejected (result
        #              carries {"error": <reason>} → the same token-error path a
        #              bad claims-decode takes).
        # Reject reasons are a fixed taxonomy; the token, key material, and claim
        # VALUES are never logged.

        _SHA256_DIGEST_INFO = bytes([
            0x30, 0x31, 0x30, 0x0d, 0x06, 0x09, 0x60, 0x86, 0x48, 0x01,
            0x65, 0x03, 0x04, 0x02, 0x01, 0x05, 0x00, 0x04, 0x20,
        ])

        def _verify_mode():
            v = (os.environ.get("NOETL_AUTH_VERIFY_SIGNATURE") or "").strip().lower()
            if v in ("shadow", "log", "observe"):
                return "shadow"
            if v in ("true", "1", "enforce", "on"):
                return "enforce"
            # Unknown / empty / off → never enforce (a typo can't silently reject).
            return "off"

        def _cfg_audiences():
            raw = os.environ.get("NOETL_AUTH0_AUDIENCE") or ""
            return [a.strip() for a in raw.split(",") if a.strip()]

        def _cfg_leeway():
            try:
                return int(os.environ.get("NOETL_AUTH_JWT_LEEWAY_SECS") or "60")
            except Exception:
                return 60

        def _b64u_decode(s):
            if isinstance(s, str):
                s = s.encode("ascii")
            return base64.urlsafe_b64decode(s + b"=" * ((-len(s)) % 4))

        def _b64u_to_int(s):
            return int.from_bytes(_b64u_decode(s), "big")

        def _rs256_ok(signing_input, signature, n, e):
            # RFC 8017 RSASSA-PKCS1-v1_5 verify with SHA-256.
            k = (n.bit_length() + 7) // 8
            if len(signature) != k:
                return False
            sig_int = int.from_bytes(signature, "big")
            if sig_int >= n:
                return False
            em = pow(sig_int, e, n).to_bytes(k, "big")
            digest = hashlib.sha256(signing_input).digest()
            t = _SHA256_DIGEST_INFO + digest
            if k < len(t) + 11:
                return False
            expected = b"\x00\x01" + (b"\xff" * (k - len(t) - 3)) + b"\x00" + t
            # constant-time compare
            if len(em) != len(expected):
                return False
            diff = 0
            for a, b in zip(em, expected):
                diff |= a ^ b
            return diff == 0

        def _select_jwk(jwks, kid):
            keys = jwks.get("keys", []) if isinstance(jwks, dict) else []
            if kid:
                for key in keys:
                    if key.get("kid") == kid:
                        return key, None
                return None, ("unknown_kid", "no JWKS key for token kid")
            if len(keys) == 1:
                return keys[0], None
            return None, ("malformed", "token header has no kid and JWKS is not single-key")

        def _verify_with_jwks(token, jwks, issuer, audiences, leeway):
            # Pure core (no HTTP / no env) — returns None on success, or
            # (outcome, reason) on failure.  Unit-tested offline.
            parts = token.split(".")
            if len(parts) != 3:
                return ("malformed", "unparseable token header")
            try:
                header = json.loads(_b64u_decode(parts[0]))
            except Exception:
                return ("malformed", "unparseable token header")
            # RS256 only — this is what rejects alg=none / HS256 forgeries.
            if header.get("alg") != "RS256":
                return ("bad_signature", "unexpected token algorithm")
            jwk, err = _select_jwk(jwks, header.get("kid"))
            if err is not None:
                return err
            if jwk.get("kty") != "RSA":
                return ("jwks_unavailable", "JWKS key is not a usable RSA key")
            try:
                n = _b64u_to_int(jwk["n"])
                e = _b64u_to_int(jwk["e"])
            except Exception:
                return ("jwks_unavailable", "JWKS key is not a usable RSA key")
            try:
                signature = _b64u_decode(parts[2])
            except Exception:
                return ("bad_signature", "invalid signature")
            signing_input = (parts[0] + "." + parts[1]).encode("ascii")
            if not _rs256_ok(signing_input, signature, n, e):
                return ("bad_signature", "invalid signature")
            try:
                claims = json.loads(_b64u_decode(parts[1]))
            except Exception:
                return ("malformed", "unparseable token payload")
            if claims.get("iss") != issuer:
                return ("bad_claims", "invalid issuer")
            now = int(time.time())
            exp = claims.get("exp")
            if exp is not None and now > int(exp) + leeway:
                return ("bad_claims", "token expired")
            nbf = claims.get("nbf")
            if nbf is not None and now + leeway < int(nbf):
                return ("bad_claims", "token not yet valid (nbf)")
            if audiences:
                aud = claims.get("aud")
                aud_list = aud if isinstance(aud, list) else ([aud] if aud is not None else [])
                if not any(a in audiences for a in aud_list):
                    return ("bad_claims", "invalid audience")
            return None

        def _fetch_jwks(url):
            # Separated so tests can stub it; each login fetches once (the
            # subprocess is ephemeral, so there is no process-global TTL cache
            # like the Rust side — an always-fresh fetch makes key rotation
            # transparent by construction).
            import urllib.request
            with urllib.request.urlopen(url, timeout=5) as resp:
                if getattr(resp, "status", 200) not in (200, None):
                    raise ValueError("JWKS endpoint returned HTTP %s" % resp.status)
                return json.loads(resp.read().decode("utf-8"))

        def _run_signature_verify(token, domain):
            # Returns None on success, or (outcome, reason) on failure.
            domain = (domain or "").strip() or (os.environ.get("NOETL_AUTH0_DOMAIN") or "").strip()
            if not domain:
                return ("no_domain", "signature verification enabled but no Auth0 domain configured")
            issuer = f"https://{domain}/"
            jwks_url = f"https://{domain}/.well-known/jwks.json"
            try:
                jwks = _fetch_jwks(jwks_url)
            except Exception:
                # Backend problem (endpoint unreachable), NOT a bad token.
                return ("jwks_unavailable", "JWKS fetch failed")
            return _verify_with_jwks(token, jwks, issuer, _cfg_audiences(), _cfg_leeway())

        # ── historical claims-only decode (UNCHANGED — the flag-off behaviour) ──
        token = args.get('auth0_token', '')
        auth0_domain = args.get('auth0_domain', '')
        try:
            parts = token.split('.')
            if len(parts) != 3:
                raise ValueError("Invalid JWT format")
            payload = parts[1]
            padding = 4 - (len(payload) % 4)
            if padding != 4:
                payload += '=' * padding
            decoded_bytes = base64.urlsafe_b64decode(payload)
            decoded = json.loads(decoded_bytes)
            issuer = decoded.get("iss")
            if auth0_domain and issuer != f"https://{auth0_domain}/":
                raise ValueError("Invalid token issuer")
            exp = decoded.get("exp")
            if exp is not None and int(exp) <= int(time.time()):
                raise ValueError("Token has expired")
            if not decoded.get("sub"):
                raise ValueError("Missing token subject")
            result = {
                "sub": decoded.get("sub"),
                "email": decoded.get("email"),
                "name": decoded.get("name", decoded.get("email")),
                "email_verified": decoded.get("email_verified", False)
            }
        except Exception as e:
            result = {"error": str(e)}

        # ── #169 additive gate: only runs in shadow / enforce ──
        _mode = _verify_mode()
        if _mode != "off" and isinstance(result, dict) and "error" not in result:
            _fail = _run_signature_verify(token, auth0_domain)
            if _fail is not None:
                _outcome, _reason = _fail
                # Fixed taxonomy only — never the token / key / claim values.
                sys.stderr.write(
                    "noetl.auth.jwt_verify mode=%s outcome=%s reason=%s\n"
                    % (_mode, _outcome, _reason)
                )
                if _mode == "enforce":
                    result = {"error": _reason}
      spec:
        policy:
          rules:
            - when: "{{ output.status == 'error' }}"
              then:
                do: continue
            - else:
                then:
                  do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: send_token_error_callback
          when: "{{ (start.error is defined) and request_id }}"
        - step: end
          when: "{{ start.error is defined and not request_id }}"
        - step: create_user_session
          when: "{{ start.sub is defined }}"

  - step: send_token_error_callback
    desc: Send token error callback to gateway
    tool:
      kind: http
      method: POST
      url: "{{ gateway_url }}/api/internal/callback"
      headers:
        Content-Type: application/json
      json:
        request_id: "{{ request_id }}"
        status: "error"
        data:
          error: "{{ start.error | default('Token validation failed') }}"
          message: "Token validation failed"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  # Step 2: Combined upsert user + role lookup + create session (pooled postgres CTE)
  - step: create_user_session
    desc: Upsert user, inherit same-email roles, and create session in single transaction
    tool:
      kind: postgres
      auth: "{{ db_credential }}"
      pool: {}
      command: |
        WITH upserted_user AS (
          INSERT INTO auth.users (auth0_id, email, display_name, last_login_at)
          VALUES (
            ('{{ start.sub | tojson | replace("'", "''") }}'::jsonb #>> '{}'),
            ('{{ start.email | tojson | replace("'", "''") }}'::jsonb #>> '{}'),
            ('{{ start.name | tojson | replace("'", "''") }}'::jsonb #>> '{}'),
            NOW()
          )
          ON CONFLICT (auth0_id)
          DO UPDATE SET
            email = EXCLUDED.email,
            display_name = EXCLUDED.display_name,
            last_login_at = NOW()
          RETURNING user_id, email, display_name, is_active
        ),
        copied_roles AS (
          INSERT INTO auth.user_roles (user_id, role_id)
          SELECT u.user_id, ur.role_id
          FROM upserted_user u
          JOIN auth.users same_email
            ON same_email.email = u.email
           AND same_email.user_id <> u.user_id
          JOIN auth.user_roles ur
            ON ur.user_id = same_email.user_id
          WHERE ur.expires_at IS NULL OR ur.expires_at > NOW()
          ON CONFLICT (user_id, role_id) DO NOTHING
          RETURNING role_id
        ),
        created_session AS (
          INSERT INTO auth.sessions (user_id, session_token, auth0_token, expires_at, ip_address)
          SELECT
            u.user_id,
            md5(random()::text || clock_timestamp()::text),
            ('{{ auth0_token | tojson | replace("'", "''") }}'::jsonb #>> '{}'),
            NOW() + INTERVAL '24 hours',
            '{{ client_ip }}'::inet
          FROM upserted_user u
          RETURNING session_token, user_id, expires_at
        ),
        resolved_roles AS (
          SELECT COALESCE(
            json_agg(r.role_name ORDER BY r.role_name) FILTER (WHERE r.role_id IS NOT NULL),
            '[]'::json
          ) AS roles
          FROM upserted_user u
          LEFT JOIN auth.user_roles ur
            ON ur.user_id = u.user_id
           AND (ur.expires_at IS NULL OR ur.expires_at > NOW())
          LEFT JOIN auth.roles r
            ON r.role_id = ur.role_id
        )
        SELECT
          s.session_token AS sess_ref,
          s.user_id,
          s.expires_at::text AS expires_at,
          u.email,
          u.display_name,
          rr.roles
        FROM created_session s
        JOIN upserted_user u ON u.user_id = s.user_id
        CROSS JOIN resolved_roles rr;
      spec:
        policy:
          rules:
            - when: "{{ output.status == 'error' }}"
              then:
                do: continue
            - else:
                then:
                  do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: prepare_session_cache
          when: "{{ create_user_session.rows is defined and create_user_session.rows | length > 0 }}"
        - step: send_db_error_callback
          when: "{{ (create_user_session.rows is not defined or create_user_session.rows | length == 0) and request_id }}"
        - step: end
          when: "{{ (create_user_session.rows is not defined or create_user_session.rows | length == 0) and not request_id }}"

  - step: send_db_error_callback
    desc: Send database error callback to gateway
    tool:
      kind: http
      method: POST
      url: "{{ gateway_url }}/api/internal/callback"
      headers:
        Content-Type: application/json
      json:
        request_id: "{{ request_id }}"
        status: "error"
        data:
          error: "Database error"
          message: "Failed to create session"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: prepare_session_cache
    desc: Prepare session payload with roles
    tool:
      kind: python
      input:
        create_user_session: "{{ create_user_session }}"
      code: |
        import json
        def rows_from_step(step_name, command_name=None):
            def pick(obj, *keys):
                current = obj
                for key in keys:
                    if current is None:
                        return None
                    if isinstance(current, dict):
                        current = current.get(key)
                        continue
                    getter = getattr(current, "get", None)
                    if callable(getter):
                        try:
                            current = getter(key)
                            continue
                        except Exception:
                            pass
                    try:
                        current = getattr(current, key)
                    except Exception:
                        return None
                return current

            step = args.get(step_name, {}) or {}
            candidates = [
                pick(step, "rows"),
                pick(step, "context", "rows"),
                pick(step, "context", "_prev", "rows"),
                pick(step, "data", "rows"),
                pick(step, "data", "context", "rows"),
            ]
            if command_name:
                candidates.extend([
                    pick(step, command_name, "rows"),
                    pick(step, "context", command_name, "rows"),
                    pick(step, "context", "results", command_name, "rows"),
                    pick(step, "data", command_name, "rows"),
                    pick(step, "data", "context", "results", command_name, "rows"),
                ])
            for candidate in candidates:
                if candidate:
                    return candidate
            return []

        session_rows = (
            rows_from_step("create_user_session", "create_user_session_task")
            or rows_from_step("create_user_session:task_sequence", "create_user_session_task")
        )
        session_row = session_rows[0] if session_rows else {}
        roles = session_row.get('roles', [])
        if isinstance(roles, str):
            try:
                roles = json.loads(roles)
            except Exception:
                roles = []
        if roles is None:
            roles = []

        user = {
            "user_id": session_row.get("user_id"),
            "email": session_row.get("email"),
            "display_name": session_row.get("display_name"),
            "roles": roles,
        }

        # NOTE: the session token is carried under the non-sensitive key
        # `sess_ref` (NOT `session_token`).  The server + worker redact any
        # field whose name contains "token" when persisting step results to
        # the event log, which would replace the real token with "[REDACTED]"
        # before the downstream NATS-cache and gateway-callback steps can read
        # it.  Carrying it as `sess_ref` lets the real value flow; the outgoing
        # gateway-contract field is still named `session_token` in the callback.
        result = {
            "session_cache": {
                "sess_ref": session_row.get("sess_ref"),
                "user_id": session_row.get("user_id"),
                "email": session_row.get("email"),
                "display_name": session_row.get("display_name"),
                "expires_at": session_row.get("expires_at"),
                "is_active": True,
                "roles": roles,
            },
            "user": user,
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: cache_and_callback

  # Step 3: Cache session in NATS and send callback
  - step: cache_and_callback
    desc: Cache session in NATS K/V and send callback to gateway
    tool:
      kind: nats
      auth: "{{ nats_credential }}"
      operation: kv_put
      bucket: "{{ session_bucket }}"
      # Key + value are rendered by the worker and written to NATS K/V before
      # the call.done event (with its event-log redaction) is emitted, so the
      # real token reaches the cache.  The value is built explicitly here with
      # the gateway-contract field name `session_token` (sourced from the
      # non-sensitive `sess_ref`) so the gateway's CachedSession can read it.
      key: "{{ prepare_session_cache.session_cache.sess_ref }}"
      value:
        session_token: "{{ prepare_session_cache.session_cache.sess_ref }}"
        user_id: "{{ prepare_session_cache.session_cache.user_id }}"
        email: "{{ prepare_session_cache.session_cache.email }}"
        display_name: "{{ prepare_session_cache.session_cache.display_name }}"
        expires_at: "{{ prepare_session_cache.session_cache.expires_at }}"
        is_active: "{{ prepare_session_cache.session_cache.is_active }}"
        roles: "{{ prepare_session_cache.session_cache.roles }}"
      spec:
        policy:
          rules:
            - when: "{{ output.status == 'error' }}"
              then:
                do: continue
            - else:
                then:
                  do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: send_success_callback
          when: "{{ request_id }}"
        - step: end
          when: "{{ not request_id }}"

  - step: send_success_callback
    desc: Send success callback to gateway
    tool:
      kind: http
      method: POST
      url: "{{ gateway_url }}/api/internal/callback"
      headers:
        Content-Type: application/json
      json:
        request_id: "{{ request_id }}"
        status: "success"
        data:
          status: "authenticated"
          session_token: "{{ prepare_session_cache.session_cache.sess_ref }}"
          user: "{{ prepare_session_cache.user }}"
          expires_at: "{{ prepare_session_cache.session_cache.expires_at }}"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: Complete
    tool:
      kind: python
      code: |
        result = {"status": "complete"}

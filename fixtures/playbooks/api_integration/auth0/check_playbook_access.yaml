apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: check_playbook_access
  path: api_integration/auth0/check_playbook_access
  description: |
    Check if user has permission to access a playbook.

    Input:
      - session_token: NoETL session token
      - playbook_path: Path to playbook
      - action: Action type (execute, view, modify)

    Output:
      - allowed: Boolean
  tags:
    - auth0
    - authorization

workload:
  # Input parameters - provided by execution request
  session_token: ""
  playbook_path: ""
  action: "execute"
  # Configuration
  db_credential: pg_auth
  callback_subject: ""  # Legacy - kept for compatibility
  request_id: ""
  # Gateway URL for HTTP callbacks (use K8s service name in cluster)
  gateway_url: "http://gateway.gateway.svc.cluster.local"

workflow:
  - step: start
    desc: Begin access check
    tool:
      kind: python
      code: |
        print(f"DEBUG: request_id = {context.get('request_id', '')}")
        result = {"status": "initialized"}
    next:
      spec:
        mode: exclusive
      arcs:
        - step: get_user_from_session

  - step: get_user_from_session
    desc: Get user from session
    tool:
      kind: postgres
      auth: "{{ db_credential }}"
      command: |
        SELECT s.user_id, u.email, u.display_name
        FROM auth.sessions s
        JOIN auth.users u ON s.user_id = u.user_id
        WHERE s.session_token = ('{{ session_token | tojson | replace("'", "''") }}'::jsonb #>> '{}')
          AND s.is_active = true
          AND s.expires_at > NOW()
          AND u.is_active = true;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: normalize_session

  - step: normalize_session
    desc: Normalize session lookup rows across runtime result envelopes
    tool:
      kind: python
      input:
        session_result: "{{ get_user_from_session }}"
      code: |
        def pick(obj, *keys):
            current = obj
            for key in keys:
                if current is None:
                    return None
                if isinstance(current, dict):
                    current = current.get(key)
                    continue
                getter = getattr(current, "get", None)
                if callable(getter):
                    try:
                        current = getter(key)
                        continue
                    except Exception:
                        pass
                try:
                    current = getattr(current, key)
                except Exception:
                    return None
            return current

        rows = []
        for candidate in (
            pick(session_result, "rows"),
            pick(session_result, "context", "rows"),
            pick(session_result, "context", "_prev", "rows"),
            pick(session_result, "data", "rows"),
            pick(session_result, "data", "context", "rows"),
            pick(session_result, "command_0", "rows"),
            pick(session_result, "context", "command_0", "rows"),
            pick(session_result, "context", "results", "command_0", "rows"),
        ):
            if candidate:
                rows = candidate
                break

        user = rows[0] if rows else {}
        result = {
            "rows": rows,
            "user": {
                "user_id": user.get("user_id"),
                "email": user.get("email"),
                "display_name": user.get("display_name"),
            },
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: check_permission
          when: "{{ normalize_session.context.rows is defined and normalize_session.context.rows | length > 0 }}"
        - step: access_denied
          when: "{{ normalize_session.context.rows is not defined or normalize_session.context.rows | length == 0 }}"

  - step: check_permission
    desc: Check permissions
    tool:
      kind: postgres
      auth: "{{ db_credential }}"
      command: |
        SELECT
          COUNT(*) > 0 as has_permission
        FROM auth.user_roles ur
        JOIN auth.roles r ON ur.role_id = r.role_id
        JOIN auth.playbook_permissions pp ON r.role_id = pp.role_id
        WHERE ur.user_id = {{ normalize_session.context.user.user_id }}
          AND (ur.expires_at IS NULL OR ur.expires_at > NOW())
          AND (
            pp.playbook_path = ('{{ playbook_path | tojson | replace("'", "''") }}'::jsonb #>> '{}')
            OR (pp.allow_pattern IS NOT NULL AND ('{{ playbook_path | tojson | replace("'", "''") }}'::jsonb #>> '{}') LIKE pp.allow_pattern)
          )
          AND (pp.deny_pattern IS NULL OR ('{{ playbook_path | tojson | replace("'", "''") }}'::jsonb #>> '{}') NOT LIKE pp.deny_pattern)
          AND (
            (('{{ action | tojson | replace("'", "''") }}'::jsonb #>> '{}') = 'execute' AND pp.can_execute = true)
            OR (('{{ action | tojson | replace("'", "''") }}'::jsonb #>> '{}') = 'view' AND pp.can_view = true)
            OR (('{{ action | tojson | replace("'", "''") }}'::jsonb #>> '{}') = 'modify' AND pp.can_modify = true)
          );
    next:
      spec:
        mode: exclusive
      arcs:
        - step: access_granted
          when: "{{ check_permission.context.rows is defined and check_permission.context.rows | length > 0 and check_permission.context.rows[0].has_permission }}"
        - step: access_denied
          when: "{{ check_permission.context.rows is not defined or check_permission.context.rows | length == 0 or not check_permission.context.rows[0].has_permission }}"

  - step: access_granted
    desc: Return allowed
    tool:
      kind: python
      input:
        playbook_path: "{{ playbook_path }}"
        action: "{{ action }}"
        user_id: "{{ normalize_session.context.user.user_id }}"
        email: "{{ normalize_session.context.user.email }}"
        display_name: "{{ normalize_session.context.user.display_name }}"
      code: |
        result = {
            "allowed": True,
            "playbook_path": playbook_path,
            "action": action,
            "user": {"user_id": user_id, "email": email, "display_name": display_name},
            "message": f"Access granted to {action} playbook"
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: send_granted_callback
          when: "{{ request_id }}"
        - step: end
          when: "{{ not request_id }}"

  - step: send_granted_callback
    desc: Send access granted callback to gateway
    tool:
      kind: http
      method: POST
      url: "{{ gateway_url }}/api/internal/callback"
      headers:
        Content-Type: application/json
      data:
        request_id: "{{ request_id }}"
        status: "success"
        data:
          allowed: true
          playbook_path: "{{ access_granted.playbook_path }}"
          permission_type: "{{ access_granted.action }}"
          user:
            user_id: "{{ normalize_session.context.user.user_id }}"
            email: "{{ normalize_session.context.user.email }}"
            display_name: "{{ normalize_session.context.user.display_name }}"
          message: "{{ access_granted.message }}"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: access_denied
    desc: Return denied
    tool:
      kind: python
      input:
        playbook_path: "{{ playbook_path }}"
        action: "{{ action }}"
      code: |
        result = {
            "allowed": False,
            "playbook_path": playbook_path,
            "action": action,
            "message": "Access denied"
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: send_denied_callback
          when: "{{ request_id }}"
        - step: end
          when: "{{ not request_id }}"

  - step: send_denied_callback
    desc: Send access denied callback to gateway
    tool:
      kind: http
      method: POST
      url: "{{ gateway_url }}/api/internal/callback"
      headers:
        Content-Type: application/json
      data:
        request_id: "{{ request_id }}"
        status: "success"
        data:
          allowed: false
          playbook_path: "{{ access_denied.playbook_path }}"
          permission_type: "{{ access_denied.action }}"
          message: "{{ access_denied.message }}"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: Complete
    tool:
      kind: python
      code: |
        result = {"status": "complete"}

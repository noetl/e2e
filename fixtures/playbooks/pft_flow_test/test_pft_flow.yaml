            {{ iter.patient.facility_mapping_id | int }},
            '{{ iter.fetch_data | tojson | replace("'", "''") }}'::jsonb
          WHERE {{ 'false' if iter.skip_save | string | lower == 'true' else 'true' }}
          ON CONFLICT (pcc_patient_id, facility_mapping_id) DO UPDATE SET
            payload = EXCLUDED.payload,
            fetched_at = NOW();
        spec:
          policy:
            rules:
              - when: '{{ output.status == "error" }}'
                then:
                  do: continue
              - else:
                  then:
                    do: continue
      - name: mark_done
        kind: postgres
        auth: pg_k8s
        command: |
          UPDATE public.pft_test_patient_work_queue q
          SET status = 'done',
              done_at = NOW(),
              worker_id = NULL,
              updated_at = NOW()
          WHERE q.execution_id = '{{ execution_id }}'
            AND q.facility_mapping_id = {{ iter.patient.facility_mapping_id | int }}
            AND q.data_type = 'demographics'
            AND q.patient_id = {{ iter.patient.patient_id | int }};
        spec:
          policy:
            rules:
              - else:
                  then:
                    do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: mark_demographics_done
          when: '{{ event.name == "loop.done" }}'

  # ------------------------------------------------------------------
  # DATA TYPE BARRIER (parallel fan-in) — TRUE-COMPLETION VARIANT
  # ------------------------------------------------------------------
  # Each mark_X_done step verifies the durable work queue has N `done`
  # rows (N = workload.patients_per_facility) using the partial done
  # index BEFORE inserting the barrier row. Result tables remain the
  # final audit source in validate_all_results, but they are not in the
  # hot control path.
  #
  # If the queue-done count is short, the step:
  #   (a) resets stuck claimed rows back to pending so a fresh cursor
  #       dispatch can pick them up on the retry arc;
  #   (b) returns data_count < N, and the next arc routes back to
  #       fetch_X to drain the remaining rows — the cursor-loop retry
  #       path replaces the prior load_patients_for_X retry loop.
  #
  # The second SQL statement materializes a one-shot stage gate from the
  # durable done table, mirroring RisingWave's "continuously maintained view"
  # idea without adding another service to this fixture. Earlier branches end
  # quietly while other issued commands remain in flight.
  #
  # 5 separate steps (vs one parameterized step with arc-level set:) so
  # each hardcodes its data_type and avoids relying on per-arc set support.
  - step: mark_assessments_done
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        WITH data_check AS (
          SELECT COUNT(*) AS n
          FROM public.pft_test_patient_work_queue
          WHERE execution_id = '{{ execution_id }}'
            AND data_type = 'assessments'
            AND status = 'done'
        ),
        reclaim_if_incomplete AS (
          UPDATE public.pft_test_patient_work_queue
          SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
          WHERE execution_id = '{{ execution_id }}'
            AND data_type = 'assessments'
            AND status = 'claimed'
            AND (SELECT n FROM data_check) < ({{ workload.num_facilities | int }} * {{ workload.patients_per_facility | int }})
          RETURNING patient_id
        ),
        barrier_insert AS (
          INSERT INTO public.pft_test_facility_data_type_done
            (execution_id, facility_mapping_id, data_type, done_at)
          SELECT '{{ execution_id }}', 0, 'assessments', NOW()
          FROM data_check WHERE n >= ({{ workload.num_facilities | int }} * {{ workload.patients_per_facility | int }})
          ON CONFLICT (execution_id, facility_mapping_id, data_type) DO NOTHING
          RETURNING 1
        )
        SELECT
          (SELECT n FROM data_check) AS data_count,
          (SELECT COUNT(*) FROM barrier_insert) AS inserted_count;

        WITH data_check AS (
          SELECT COUNT(*) AS n
          FROM public.pft_test_patient_work_queue
          WHERE execution_id = '{{ execution_id }}'
            AND data_type = 'assessments'
            AND status = 'done'
        ),
        done_count AS (
          SELECT COUNT(*) AS n
          FROM public.pft_test_facility_data_type_done
          WHERE execution_id = '{{ execution_id }}'
        ),
        stage_advance AS (
          INSERT INTO public.pft_test_facility_stage_gate
            (execution_id, facility_mapping_id, stage, advanced_at)
          SELECT '{{ execution_id }}', 0, 'data_types_complete', NOW()
          FROM done_count
          WHERE n >= 5
          ON CONFLICT (execution_id, facility_mapping_id, stage) DO NOTHING
          RETURNING 1
        )
        SELECT
          (SELECT n FROM data_check) AS data_count,
          (SELECT n FROM done_count) AS done_count,
          (SELECT COUNT(*) FROM stage_advance) AS advanced_count;
    next:
      spec:
        mode: exclusive
        on_no_match: quiet
      arcs:
        - step: fetch_assessments
          when: '{{ (output.data.rows[0].data_count | default(0) | int) < (workload.num_facilities | int) * (workload.patients_per_facility | int) }}'
        - step: prepare_mds_work
          when: '{{ (output.data.rows[0].advanced_count | default(0) | int) > 0 }}'

  - step: mark_conditions_done

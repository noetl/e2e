apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: test_pft_flow_v2
  path: fixtures/playbooks/pft_flow_test/test_pft_flow_v2
  description: |
    Full-pipeline PFT flow test v2 — mirrors state_report_generation_prod_v13 without Snowflake.

    Tests cursor-based one-record HTTP fetches with execution-scoped claim state.
    If all patients across all facilities are processed, NoETL is stable and
    the production playbook should work.

    Setup:
    - 10 facilities, 1000 patients each = 10 000 patients total
    - Work is claimed per patient and page and processed only through
      declared NoETL actions: http fetches from the fixture server, postgres
      persists explicit result sets, and task_sequence policies control retry.
    - 4 paginated data types (assessments 2-4p, conditions 1-3p,
      medications 2-3p, vital_signs 1p always) + demographics + MDS details.
    - All test tables are prefixed pft_test_* in public schema

    Go/no-go criterion: validate_facility_results shows 1000/1000 per facility for all
    5 data types.  Any shortfall indicates the patient-loss bug is still present.

workload:
  api_url: http://paginated-api.test-server.svc.cluster.local:5555
  page_size: 1
  num_facilities: 10
  patients_per_facility: 1000
  pft_http_concurrency: 8

workflow:
  # ------------------------------------------------------------------
  # SETUP: create tables, seed facility list
  # ------------------------------------------------------------------
  - step: start
    desc: Create all test tables and seed 10 facilities
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        -- Facilities table
        CREATE TABLE IF NOT EXISTS public.pft_test_facilities (
          facility_mapping_id  INTEGER      PRIMARY KEY,
          facility_name        TEXT         NOT NULL,
          facility_id          INTEGER      NOT NULL,
          active               BOOLEAN      NOT NULL DEFAULT TRUE,
          updated_at           TIMESTAMPTZ  NOT NULL DEFAULT NOW()
        );

        -- Patient IDs work table (all facilities for this run)
        CREATE TABLE IF NOT EXISTS public.pft_test_patient_ids_work (
          patient_id          INTEGER NOT NULL,
          facility_mapping_id INTEGER NOT NULL,
          facility_org_uuid   TEXT    NOT NULL,
          PRIMARY KEY (patient_id, facility_mapping_id)
        );

        -- Execution-scoped queue table for resilient claim/processing flow
        CREATE TABLE IF NOT EXISTS public.pft_test_patient_work_queue (
          execution_id        TEXT        NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          data_type           TEXT        NOT NULL,
          patient_id          INTEGER     NOT NULL,
          status              TEXT        NOT NULL,
          attempt_count       INTEGER     NOT NULL DEFAULT 0,
          worker_id           TEXT,
          claimed_at          TIMESTAMPTZ,
          done_at             TIMESTAMPTZ,
          next_retry_at       TIMESTAMPTZ,
          last_error          TEXT,
          created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (execution_id, facility_mapping_id, data_type, patient_id)
        );

        CREATE INDEX IF NOT EXISTS idx_pft_queue_pending
          ON public.pft_test_patient_work_queue (execution_id, facility_mapping_id, data_type, patient_id)
          WHERE status = 'pending';

        CREATE INDEX IF NOT EXISTS idx_pft_queue_claimed
          ON public.pft_test_patient_work_queue (execution_id, facility_mapping_id, data_type, patient_id)
          WHERE status = 'claimed';

        CREATE INDEX IF NOT EXISTS idx_pft_queue_done
          ON public.pft_test_patient_work_queue (execution_id, facility_mapping_id, data_type, patient_id)
          WHERE status = 'done';

        -- Reclaim index: lets stale-claim sweep use claimed_at as an index
        -- condition instead of a post-filter. Critical for sustained throughput
        -- under high update churn (claim→done→reclaim cycles).
        -- In this reset-heavy fixture we create it non-concurrently during setup;
        -- use pft_queue_db_maintenance for live DB tuning on existing tables.
        CREATE INDEX IF NOT EXISTS idx_pft_queue_claimed_reclaim
          ON public.pft_test_patient_work_queue (execution_id, data_type, claimed_at, facility_mapping_id, patient_id)
          WHERE status = 'claimed';

        -- Autovacuum tuning for high-churn work queue: vacuum at 2% dead
        -- (default 20%), faster vacuum cycle, 80% fillfactor for HOT updates.
        -- The one-time VACUUM for already-bloated tables lives in the companion
        -- maintenance playbook because VACUUM requires autocommit.
        ALTER TABLE public.pft_test_patient_work_queue SET (
          autovacuum_vacuum_scale_factor = 0.02,
          autovacuum_analyze_scale_factor = 0.01,
          autovacuum_vacuum_cost_delay = 2,
          fillfactor = 80
        );

        -- Result tables
        CREATE TABLE IF NOT EXISTS public.pft_test_patient_assessments (
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          page_number         INTEGER     NOT NULL,
          payload             JSONB,
          is_last_page        BOOLEAN     NOT NULL DEFAULT FALSE,
          PRIMARY KEY (pcc_patient_id, facility_mapping_id, page_number)
        );

        CREATE TABLE IF NOT EXISTS public.pft_test_patient_conditions (
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          page_number         INTEGER     NOT NULL,
          payload             JSONB,
          is_last_page        BOOLEAN     NOT NULL DEFAULT FALSE,
          PRIMARY KEY (pcc_patient_id, facility_mapping_id, page_number)
        );

        CREATE TABLE IF NOT EXISTS public.pft_test_patient_medications (
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          page_number         INTEGER     NOT NULL,
          payload             JSONB,
          is_last_page        BOOLEAN     NOT NULL DEFAULT FALSE,
          PRIMARY KEY (pcc_patient_id, facility_mapping_id, page_number)
        );

        CREATE TABLE IF NOT EXISTS public.pft_test_patient_vital_signs (
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          page_number         INTEGER     NOT NULL,
          payload             JSONB,
          is_last_page        BOOLEAN     NOT NULL DEFAULT FALSE,
          PRIMARY KEY (pcc_patient_id, facility_mapping_id, page_number)
        );

        CREATE TABLE IF NOT EXISTS public.pft_test_patient_demographics (
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          payload             JSONB,
          fetched_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (pcc_patient_id, facility_mapping_id)
        );

        CREATE INDEX IF NOT EXISTS idx_pft_assessments_facility_patient
          ON public.pft_test_patient_assessments (facility_mapping_id, pcc_patient_id);
        CREATE INDEX IF NOT EXISTS idx_pft_conditions_facility_patient
          ON public.pft_test_patient_conditions (facility_mapping_id, pcc_patient_id);
        CREATE INDEX IF NOT EXISTS idx_pft_medications_facility_patient
          ON public.pft_test_patient_medications (facility_mapping_id, pcc_patient_id);
        CREATE INDEX IF NOT EXISTS idx_pft_vital_signs_facility_patient
          ON public.pft_test_patient_vital_signs (facility_mapping_id, pcc_patient_id);
        CREATE INDEX IF NOT EXISTS idx_pft_demographics_facility_patient
          ON public.pft_test_patient_demographics (facility_mapping_id, pcc_patient_id);

        -- MDS tables
        CREATE TABLE IF NOT EXISTS public.pft_test_mds_assessment_ids_work (
          assessment_id       TEXT        NOT NULL,
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          status              TEXT        NOT NULL DEFAULT 'pending',
          claimed_at          TIMESTAMPTZ,
          done_at             TIMESTAMPTZ,
          attempt_count       INTEGER     NOT NULL DEFAULT 0,
          worker_id           TEXT,
          updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (assessment_id)
        );
        ALTER TABLE public.pft_test_mds_assessment_ids_work
          ADD COLUMN IF NOT EXISTS status TEXT NOT NULL DEFAULT 'pending',
          ADD COLUMN IF NOT EXISTS claimed_at TIMESTAMPTZ,
          ADD COLUMN IF NOT EXISTS done_at TIMESTAMPTZ,
          ADD COLUMN IF NOT EXISTS attempt_count INTEGER NOT NULL DEFAULT 0,
          ADD COLUMN IF NOT EXISTS worker_id TEXT,
          ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW();
        CREATE INDEX IF NOT EXISTS idx_pft_mds_ids_pending
          ON public.pft_test_mds_assessment_ids_work (facility_mapping_id, status, assessment_id);

        CREATE TABLE IF NOT EXISTS public.pft_test_mds_assessment_details (
          assessment_id       TEXT        NOT NULL,
          pcc_patient_id      INTEGER     NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          payload             JSONB,
          fetched_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (assessment_id)
        );

        -- Validation log (written per facility after processing)
        CREATE TABLE IF NOT EXISTS public.pft_test_validation_log (
          execution_id           TEXT        NOT NULL,
          facility_mapping_id    INTEGER     NOT NULL,
          assessments_done       INTEGER,
          conditions_done        INTEGER,
          medications_done       INTEGER,
          vital_signs_done       INTEGER,
          demographics_done      INTEGER,
          assessments_queue_done INTEGER,
          mds_expected           INTEGER,
          mds_details_done       INTEGER,
          total_expected         INTEGER,
          logged_at              TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (execution_id, facility_mapping_id)
        );
        -- Add columns if missing (for reruns on existing table)
        ALTER TABLE public.pft_test_validation_log
          ADD COLUMN IF NOT EXISTS assessments_queue_done INTEGER,
          ADD COLUMN IF NOT EXISTS mds_expected INTEGER,
          ADD COLUMN IF NOT EXISTS mds_details_done INTEGER;

        -- Per-facility data-type completion facts.
        -- Each of the 5 parallel data-type pipelines INSERTs one row when its
        -- patient queue drains. A separate stage-gate table below advances the
        -- facility exactly once after all 5 facts are present.
        CREATE TABLE IF NOT EXISTS public.pft_test_facility_data_type_done (
          execution_id        TEXT        NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          data_type           TEXT        NOT NULL,
          done_at             TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (execution_id, facility_mapping_id, data_type)
        );

        -- RisingWave-style durable stage gate: the input table above is the
        -- source of truth, and this table is the materialized one-shot
        -- checkpoint that lets exactly one branch advance to MDS.
        CREATE TABLE IF NOT EXISTS public.pft_test_facility_stage_gate (
          execution_id        TEXT        NOT NULL,
          facility_mapping_id INTEGER     NOT NULL,
          stage               TEXT        NOT NULL,
          advanced_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (execution_id, facility_mapping_id, stage)
        );

        -- Reset all per-run data (truncate keeps tables small and inserts fast)
        TRUNCATE public.pft_test_patient_work_queue;
        TRUNCATE public.pft_test_patient_ids_work;
        TRUNCATE public.pft_test_patient_assessments;
        TRUNCATE public.pft_test_patient_conditions;
        TRUNCATE public.pft_test_patient_medications;
        TRUNCATE public.pft_test_patient_vital_signs;
        TRUNCATE public.pft_test_patient_demographics;
        TRUNCATE public.pft_test_mds_assessment_ids_work;
        TRUNCATE public.pft_test_mds_assessment_details;
        TRUNCATE public.pft_test_validation_log;
        TRUNCATE public.pft_test_facility_data_type_done;
        TRUNCATE public.pft_test_facility_stage_gate;

        -- Reset facilities for this run
        DELETE FROM public.pft_test_facilities;
        INSERT INTO public.pft_test_facilities (facility_mapping_id, facility_name, facility_id, active)
        SELECT
          seq AS facility_mapping_id,
          'Test Facility ' || seq AS facility_name,
          seq AS facility_id,
          TRUE AS active
        FROM generate_series(1, {{ workload.num_facilities | int }}) AS seq;

        SELECT COUNT(*) AS facility_count FROM public.pft_test_facilities WHERE active = TRUE;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: load_next_facility

  # ------------------------------------------------------------------
  # FACILITY LOOP
  # ------------------------------------------------------------------
  - step: load_next_facility
    desc: Pick the next unprocessed facility (lowest active facility_mapping_id)
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        SELECT facility_mapping_id, facility_name, facility_id,
               'org-' || facility_mapping_id AS facility_org_uuid
        FROM public.pft_test_facilities
        WHERE active = TRUE
        ORDER BY facility_mapping_id
        LIMIT 1;
      spec:
        policy:
          rules:
            - when: '{{ output.status == "error" }}'
              then:
                do: retry
                attempts: 5
                backoff: exponential
                delay: 1.0
            - else:
                then:
                  do: continue
    # Step-level set ensures ctx.facility_* survives STATE-LOAD (state cache reconstruction).
    # Arc-level set:  is NOT replayed during state reconstruction; step-level set: IS.
    set:
      ctx.facility_mapping_id: '{{ output.data.rows[0].facility_mapping_id if (output.data.row_count | default(0) | int) > 0 else (ctx.facility_mapping_id | default(0)) }}'
      ctx.facility_org_uuid: '{{ output.data.rows[0].facility_org_uuid if (output.data.row_count | default(0) | int) > 0 else (ctx.facility_org_uuid | default("")) }}'
      ctx.facility_id: '{{ output.data.rows[0].facility_id if (output.data.row_count | default(0) | int) > 0 else (ctx.facility_id | default(0)) }}'
      ctx.facility_name: '{{ output.data.rows[0].facility_name if (output.data.row_count | default(0) | int) > 0 else (ctx.facility_name | default("")) }}'
    next:
      spec:
        mode: exclusive
      arcs:
        - step: setup_facility_work
          when: '{{ (output.data.row_count | default(0) | int) > 0 }}'
        - step: validate_all_results
          when: '{{ (output.data.row_count | default(0) | int) == 0 }}'

  - step: setup_facility_work
    desc: |
      Idempotently seed patient work for the current facility only. The v2 flow
      drains one facility through every data type before moving to the next.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        -- Seed test patients for this facility only: facility N gets IDs
        -- (N-1)*patients_per_facility+1 .. N*patients_per_facility.
        INSERT INTO public.pft_test_patient_ids_work (patient_id, facility_mapping_id, facility_org_uuid)
        SELECT
          ((f.facility_mapping_id) - 1) * {{ workload.patients_per_facility | int }} + seq AS patient_id,
          f.facility_mapping_id AS facility_mapping_id,
          'org-' || f.facility_mapping_id AS facility_org_uuid
        FROM public.pft_test_facilities f
        CROSS JOIN generate_series(1, {{ workload.patients_per_facility | int }}) AS seq
        WHERE f.facility_mapping_id = {{ ctx.facility_mapping_id | int }}
        ON CONFLICT (patient_id, facility_mapping_id) DO NOTHING;

        -- Seed missing execution-scoped queue rows for all data types.
        -- If this step is replayed, preserve existing claimed/done progress.
        INSERT INTO public.pft_test_patient_work_queue (
          execution_id, facility_mapping_id, data_type, patient_id, status
        )
        SELECT
          '{{ execution_id }}',
          w.facility_mapping_id,
          t.data_type,
          w.patient_id,
          'pending'
        FROM public.pft_test_patient_ids_work w
        CROSS JOIN (
          VALUES
            ('assessments'),
            ('conditions'),
            ('medications'),
            ('vital_signs'),
            ('demographics')
        ) AS t(data_type)
        WHERE w.facility_mapping_id = {{ ctx.facility_mapping_id | int }}
        ON CONFLICT (execution_id, facility_mapping_id, data_type, patient_id) DO NOTHING;

        -- Reset this facility's barrier rows in case of replay.
        DELETE FROM public.pft_test_facility_data_type_done
        WHERE execution_id = '{{ execution_id }}'
          AND facility_mapping_id = {{ ctx.facility_mapping_id | int }};

        DELETE FROM public.pft_test_facility_stage_gate
        WHERE execution_id = '{{ execution_id }}'
          AND facility_mapping_id = {{ ctx.facility_mapping_id | int }};

        SELECT COUNT(*) AS patient_count
        FROM public.pft_test_patient_ids_work
        WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }};
    next:
      spec:
        mode: exclusive
      arcs:
        - step: fetch_assessments

  # ------------------------------------------------------------------
  # FETCH ASSESSMENTS (one record per call)
  # ------------------------------------------------------------------
  - step: fetch_assessments
    desc: |
      Cursor-driven per-patient fetch/save for assessments. The current facility
      is fully drained before the playbook advances to the next data type.
    loop:
      cursor:
        kind: postgres
        auth: pg_k8s
        claim: |
          WITH reclaim_stale AS (
            UPDATE public.pft_test_patient_work_queue
            SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
            WHERE execution_id = '{{ execution_id }}'
              AND data_type = 'assessments'
              AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
              AND status = 'claimed'
              AND claimed_at < NOW() - INTERVAL '5 minutes'
          ),
          candidate AS (
            SELECT patient_id, facility_mapping_id
            FROM public.pft_test_patient_work_queue
            WHERE execution_id = '{{ execution_id }}'
              AND data_type = 'assessments'
              AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
              AND status = 'pending'
            ORDER BY ((patient_id - 1) % {{ workload.patients_per_facility | int }}), facility_mapping_id
            FOR UPDATE SKIP LOCKED
            LIMIT 1
          )
          UPDATE public.pft_test_patient_work_queue q
          SET status = 'claimed',
              attempt_count = q.attempt_count + 1,
              worker_id = 'cursor:assessments',
              claimed_at = NOW(),
              updated_at = NOW()
          FROM candidate c
          WHERE q.execution_id = '{{ execution_id }}'
            AND q.facility_mapping_id = c.facility_mapping_id
            AND q.data_type = 'assessments'
            AND q.patient_id = c.patient_id
          RETURNING q.patient_id, q.facility_mapping_id;
      iterator: patient
      spec:
        mode: cursor
        max_in_flight: '{{ pft_http_concurrency | int }}'
    tool:
      - name: init_page
        kind: noop
        spec:
          policy:
            rules:
              - else:
                  then:
                    do: continue
                    set:
                      iter.page: 1
      - name: fetch_page
        kind: http
        method: GET
        url: '{{ api_url }}/api/v1/patient/assessments'
        timeout: 8
        params:
          patientId: '{{ iter.patient.patient_id }}'
          page: '{{ iter.page }}'
          pageSize: '{{ page_size }}'
        spec:
          policy:
            rules:
              - when: '{{ output.status == "error" and (output.http.status in [400, 404]) }}'
                then:
                  do: continue
                  set:
                    iter.has_more: false
                    iter.page_data: {}
                    iter.current_page: '{{ iter.page | int }}'
                    iter.skip_save: true
              - when: '{{ output.status == "error" }}'
                then:
                  do: retry
                  attempts: 3
              - else:
                  then:
                    do: continue
                    set:
                      iter.has_more: '{{ output.data.data.paging.hasMore }}'
                      iter.page_data: '{{ output.data.data.data }}'
                      iter.current_page: '{{ output.data.data.paging.page }}'
                      iter.skip_save: false
      - name: save_page
        kind: postgres
        auth: pg_k8s
        command: |
          WITH save_page AS (
            INSERT INTO public.pft_test_patient_assessments (pcc_patient_id, facility_mapping_id, page_number, payload, is_last_page)
            SELECT
              {{ iter.patient.patient_id }},
              {{ iter.patient.facility_mapping_id | int }},
              {{ iter.current_page }},
              '{{ iter.page_data | tojson | replace("'", "''") }}'::jsonb,
              {{ 'false' if iter.has_more | string | lower == 'true' else 'true' }}
            WHERE {{ 'false' if iter.skip_save | string | lower == 'true' else 'true' }}
            ON CONFLICT (pcc_patient_id, facility_mapping_id, page_number) DO UPDATE SET
              payload = EXCLUDED.payload,
              is_last_page = EXCLUDED.is_last_page
          ),
          mark_done AS (
            UPDATE public.pft_test_patient_work_queue q
            SET status = CASE
                  WHEN {{ 'true' if iter.has_more | string | lower == 'true' else 'false' }} THEN 'claimed'
                  ELSE 'done'
                END,
                done_at = CASE
                  WHEN {{ 'true' if iter.has_more | string | lower == 'true' else 'false' }} THEN q.done_at
                  ELSE NOW()
                END,
                worker_id = CASE
                  WHEN {{ 'true' if iter.has_more | string | lower == 'true' else 'false' }} THEN q.worker_id
                  ELSE NULL
                END,
                claimed_at = CASE
                  WHEN {{ 'true' if iter.has_more | string | lower == 'true' else 'false' }} THEN q.claimed_at
                  ELSE NULL
                END,
                updated_at = NOW()
            WHERE q.execution_id = '{{ execution_id }}'
              AND q.facility_mapping_id = {{ iter.patient.facility_mapping_id | int }}
              AND q.data_type = 'assessments'
              AND q.patient_id = {{ iter.patient.patient_id | int }}
          )
          SELECT 1 AS ok;
      - name: paginate
        kind: noop
        spec:
          policy:
            rules:
              - when: '{{ iter.has_more | string | lower == "true" }}'
                then:
                  do: jump
                  to: fetch_page
                  set:
                    iter.page: '{{ (iter.page | int) + 1 }}'
    next:
      spec:
        mode: exclusive
      arcs:
        - step: mark_assessments_done

  - step: mark_assessments_done
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        WITH data_check AS (
          SELECT COUNT(*) AS n
          FROM public.pft_test_patient_work_queue
          WHERE execution_id = '{{ execution_id }}'
            AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
            AND data_type = 'assessments'
            AND status = 'done'
        ),
        reclaim_if_incomplete AS (
          UPDATE public.pft_test_patient_work_queue
          SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
          WHERE execution_id = '{{ execution_id }}'
            AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
            AND data_type = 'assessments'
            AND status = 'claimed'
            AND (SELECT n FROM data_check) < {{ workload.patients_per_facility | int }}
          RETURNING patient_id
        ),
        barrier_insert AS (
          INSERT INTO public.pft_test_facility_data_type_done
            (execution_id, facility_mapping_id, data_type, done_at)
          SELECT '{{ execution_id }}', {{ ctx.facility_mapping_id | int }}, 'assessments', NOW()
          FROM data_check WHERE n >= {{ workload.patients_per_facility | int }}
          ON CONFLICT (execution_id, facility_mapping_id, data_type) DO NOTHING
          RETURNING 1
        )
        SELECT (SELECT n FROM data_check) AS data_count,
               (SELECT COUNT(*) FROM barrier_insert) AS inserted_count;
    next:
      spec:
        mode: exclusive
        on_no_match: quiet
      arcs:
        - step: fetch_assessments
          when: '{{ (output.data.rows[0].data_count | default(0) | int) < (workload.patients_per_facility | int) }}'
        - step: fetch_conditions
          when: '{{ (output.data.rows[0].data_count | default(0) | int) >= (workload.patients_per_facility | int) }}'
  # ------------------------------------------------------------------
  # FETCH CONDITIONS (one record per call)
  # ------------------------------------------------------------------
  - step: fetch_conditions
    desc: |
      Cursor-driven per-patient fetch/save for conditions. The current facility
      is fully drained before the playbook advances to the next data type.
    loop:
      cursor:
        kind: postgres
        auth: pg_k8s
        claim: |
          WITH reclaim_stale AS (
            UPDATE public.pft_test_patient_work_queue
            SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
            WHERE execution_id = '{{ execution_id }}'
              AND data_type = 'conditions'
              AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
              AND status = 'claimed'
              AND claimed_at < NOW() - INTERVAL '5 minutes'
          ),
          candidate AS (
            SELECT patient_id, facility_mapping_id
            FROM public.pft_test_patient_work_queue
            WHERE execution_id = '{{ execution_id }}'
              AND data_type = 'conditions'
              AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
              AND status = 'pending'
            ORDER BY ((patient_id - 1) % {{ workload.patients_per_facility | int }}), facility_mapping_id
            FOR UPDATE SKIP LOCKED
            LIMIT 1
          )
          UPDATE public.pft_test_patient_work_queue q
          SET status = 'claimed',
              attempt_count = q.attempt_count + 1,
              worker_id = 'cursor:conditions',
              claimed_at = NOW(),
              updated_at = NOW()
          FROM candidate c
          WHERE q.execution_id = '{{ execution_id }}'
            AND q.facility_mapping_id = c.facility_mapping_id
            AND q.data_type = 'conditions'
            AND q.patient_id = c.patient_id
          RETURNING q.patient_id, q.facility_mapping_id;
      iterator: patient
      spec:
        mode: cursor
        max_in_flight: '{{ pft_http_concurrency | int }}'

      spec:
        mode: exclusive
        on_no_match: quiet
      arcs:
        - step: fetch_demographics
          when: '{{ (output.data.rows[0].data_count | default(0) | int) < (workload.patients_per_facility | int) }}'
        - step: prepare_mds_work
          when: '{{ (output.data.rows[0].data_count | default(0) | int) >= (workload.patients_per_facility | int) }}'

  # ------------------------------------------------------------------
  # MDS DETAIL FETCHING (cursor HTTP, no batching)
  # ------------------------------------------------------------------
  - step: prepare_mds_work
    desc: |
      Clear old MDS work entries and populate them from all facilities.
      Each saved assessment page carries 5-10 MDS assessment IDs in the
      response payload; every ID becomes one cursor-driven MDS detail call.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        DELETE FROM public.pft_test_mds_assessment_ids_work
        WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }};

        DELETE FROM public.pft_test_mds_assessment_details
        WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }};

        WITH assessment_records AS (
          SELECT
            a.pcc_patient_id,
            a.facility_mapping_id,
            a.page_number,
            record
          FROM public.pft_test_patient_assessments a
          CROSS JOIN LATERAL JSONB_ARRAY_ELEMENTS(a.payload) AS item(record)
          WHERE a.facility_mapping_id = {{ ctx.facility_mapping_id | int }}
        ),
        mds_ids AS (
          SELECT DISTINCT
            mds.assessment_id,
            pcc_patient_id,
            facility_mapping_id
          FROM assessment_records
          CROSS JOIN LATERAL JSONB_ARRAY_ELEMENTS_TEXT(record->'mdsAssessmentIds') AS mds(assessment_id)
          WHERE record ? 'mdsAssessmentIds'
        )
        INSERT INTO public.pft_test_mds_assessment_ids_work (assessment_id, pcc_patient_id, facility_mapping_id)
        SELECT
          assessment_id,
          pcc_patient_id,
          facility_mapping_id
        FROM mds_ids
        ON CONFLICT (assessment_id) DO NOTHING;

        SELECT COUNT(*) AS mds_assessment_count
        FROM public.pft_test_mds_assessment_ids_work
        WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }};
    next:
      spec:
        mode: exclusive
      arcs:
        - step: count_mds_assessments

  - step: count_mds_assessments
    desc: Count MDS assessments pending for the current facility
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        SELECT
          {{ ctx.facility_mapping_id | int }} AS facility_mapping_id,
          COUNT(*) AS mds_assessment_count
        FROM public.pft_test_mds_assessment_ids_work
        WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }};
    next:
      spec:
        mode: exclusive
      arcs:
        - step: fetch_mds_details
          when: '{{ (output.data.rows[0].mds_assessment_count | int) > 0 }}'
        - step: validate_facility_results
          when: '{{ (output.data.rows[0].mds_assessment_count | int) == 0 }}'

  - step: fetch_mds_details
    desc: |
      Cursor-driven MDS detail fetch/save. Each MDS ID is claimed and fetched
      through the same bounded one-record HTTP pattern used by patient domains.
    loop:
      cursor:
        kind: postgres
        auth: pg_k8s
        claim: |
          WITH reclaim_stale AS (
            UPDATE public.pft_test_mds_assessment_ids_work
            SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
            WHERE status = 'claimed'
              AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
              AND claimed_at < NOW() - INTERVAL '60 seconds'
          ),
          candidate AS (
            SELECT assessment_id, pcc_patient_id, facility_mapping_id
            FROM public.pft_test_mds_assessment_ids_work
            WHERE status = 'pending'
              AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
            ORDER BY assessment_id
            FOR UPDATE SKIP LOCKED
            LIMIT 1
          )
          UPDATE public.pft_test_mds_assessment_ids_work q
          SET status = 'claimed',
              attempt_count = q.attempt_count + 1,
              worker_id = 'cursor:mds',
              claimed_at = NOW(),
              updated_at = NOW()
          FROM candidate c
          WHERE q.assessment_id = c.assessment_id
          RETURNING q.assessment_id, q.pcc_patient_id, q.facility_mapping_id;
      iterator: mds_row
      spec:
        mode: cursor
        # Match the patient-domain cursor cap for the one-record HTTP contract.
        max_in_flight: '{{ pft_http_concurrency | int }}'
    tool:
      - name: fetch
        kind: http
        method: GET
        url: '{{ api_url }}/api/v1/mds/assessment/{{ iter.mds_row.assessment_id }}'
        timeout: 8
        spec:
          policy:
            rules:
              - when: '{{ output.status == "error" }}'
                then:
                  do: retry
                  attempts: 3
                  backoff: exponential
                  delay: 0.5
              - else:
                  then:
                    do: continue
                    set:
                      iter.detail: '{{ output.data.data }}'
      - name: save
        kind: postgres
        auth: pg_k8s
        command: |
          WITH save_detail AS (
            INSERT INTO public.pft_test_mds_assessment_details (
              assessment_id, pcc_patient_id, facility_mapping_id, payload
            )
            VALUES (
              '{{ iter.mds_row.assessment_id }}',
              {{ iter.mds_row.pcc_patient_id }},
              {{ iter.mds_row.facility_mapping_id | int }},
              '{{ iter.detail | tojson | replace("'", "''") }}'::jsonb
            )
            ON CONFLICT (assessment_id) DO UPDATE SET
              payload = EXCLUDED.payload,
              fetched_at = NOW()
          )
          UPDATE public.pft_test_mds_assessment_ids_work
          SET status = 'done',
              done_at = NOW(),
              worker_id = NULL,
              updated_at = NOW()
          WHERE assessment_id = '{{ iter.mds_row.assessment_id }}';
        spec:
          policy:
            rules:
              - when: '{{ output.status == "error" }}'
                then:
                  do: fail
              - else:
                  then:
                    do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: wait_for_mds_completion
          when: '{{ event.name == "loop.done" }}'

  - step: wait_for_mds_completion
    desc: |
      Gate final validation on MDS detail completeness. The MDS cursor
      loop can report loop.done while late child writes are still landing; this
      bounded wait makes that visible and prevents partial MDS from passing
      silently. Defaults allow up to ~10 minutes for late MDS detail writes.
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        WITH reclaim_stale AS (
          UPDATE public.pft_test_mds_assessment_ids_work
          SET status = 'pending', claimed_at = NULL, worker_id = NULL, updated_at = NOW()
          WHERE status = 'claimed'
            AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
            AND claimed_at < NOW() - INTERVAL '60 seconds'
          RETURNING 1
        ),
        scoped_counts AS (
          SELECT
            (SELECT COUNT(*) FROM public.pft_test_mds_assessment_ids_work
             WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS mds_expected,
            (SELECT COUNT(*) FROM public.pft_test_mds_assessment_details
             WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS mds_details_done,
            (SELECT COUNT(*) FROM public.pft_test_mds_assessment_ids_work
             WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}
               AND status = 'pending') AS mds_pending,
            (SELECT COUNT(*) FROM public.pft_test_mds_assessment_ids_work
             WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}
               AND status = 'claimed') AS mds_claimed,
            (SELECT COUNT(*) FROM reclaim_stale) AS mds_reclaimed
        )
        SELECT
          mds_expected,
          mds_details_done,
          mds_pending,
          mds_claimed,
          mds_reclaimed,
          (mds_expected = mds_details_done) AS mds_complete
        FROM scoped_counts;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: validate_facility_results
          when: '{{ ((output.data.rows | default(output.data) | first).mds_complete | string | lower) == "true" }}'
        - step: fetch_mds_details
          when: '{{ ((output.data.rows | default(output.data) | first).mds_complete | string | lower) != "true" }}'

  # ------------------------------------------------------------------
  # FACILITY VALIDATION + COMPLETION
  # ------------------------------------------------------------------
  - step: validate_facility_results
    desc: |
      Count ACTUAL fetched patient data per data type (not queued claims).
      This is the true correctness check: a patient is "done" only when data
      was saved to the result tables, not just when a patient was claimed.
      With the 2.14.7 loop.done race bug, queue entries can be marked done for all
      patients but data is only saved for ~1 batch worth (100 patients) before
      the race fires loop.done prematurely and cuts off subsequent batches.
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        SELECT
          ({{ ctx.facility_mapping_id | int }}) AS facility_mapping_id,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_assessments
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS assessments_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_conditions
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS conditions_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_medications
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS medications_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_vital_signs
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS vital_signs_done,
          (SELECT COUNT(DISTINCT pcc_patient_id) FROM public.pft_test_patient_demographics
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS demographics_done,
          (SELECT COUNT(DISTINCT patient_id) FROM public.pft_test_patient_work_queue
           WHERE execution_id = '{{ execution_id }}'
             AND data_type = 'assessments'
             AND facility_mapping_id = {{ ctx.facility_mapping_id | int }}
              AND status = 'done') AS assessments_queue_done,
          (SELECT COUNT(*) FROM public.pft_test_mds_assessment_ids_work
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS mds_expected,
          (SELECT COUNT(*) FROM public.pft_test_mds_assessment_details
           WHERE facility_mapping_id = {{ ctx.facility_mapping_id | int }}) AS mds_details_done;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: assert_facility_validation_ready

  - step: assert_facility_validation_ready
    desc: |
      Hard guard before writing the validation log. This catches any future
      policy-output shape regression in wait_for_mds_completion and prevents a
      partial MDS count from being recorded as a successful facility result.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        DO $$
        DECLARE
          expected INTEGER := {{ workload.patients_per_facility | int }};
          failures TEXT[];
        BEGIN
          SELECT ARRAY_REMOVE(ARRAY[
            CASE WHEN {{ validate_facility_results.rows[0].assessments_done | int }} <> expected THEN 'assessments_done' END,
            CASE WHEN {{ validate_facility_results.rows[0].conditions_done | int }} <> expected THEN 'conditions_done' END,
            CASE WHEN {{ validate_facility_results.rows[0].medications_done | int }} <> expected THEN 'medications_done' END,
            CASE WHEN {{ validate_facility_results.rows[0].vital_signs_done | int }} <> expected THEN 'vital_signs_done' END,
            CASE WHEN {{ validate_facility_results.rows[0].demographics_done | int }} <> expected THEN 'demographics_done' END,
            CASE WHEN {{ validate_facility_results.rows[0].assessments_queue_done | int }} <> expected THEN 'assessments_queue_done' END,
            CASE WHEN {{ validate_facility_results.rows[0].mds_expected | int }} <> {{ validate_facility_results.rows[0].mds_details_done | int }} THEN 'mds_details_done' END
          ], NULL) INTO failures;

          IF ARRAY_LENGTH(failures, 1) IS NOT NULL THEN
            RAISE EXCEPTION 'Facility validation is incomplete: %', ARRAY_TO_STRING(failures, ', ');
          END IF;
        END $$;

        SELECT
          'ready' AS status,
          {{ validate_facility_results.rows[0].facility_mapping_id | int }} AS facility_mapping_id,
          {{ validate_facility_results.rows[0].assessments_done | int }} AS assessments_done,
          {{ validate_facility_results.rows[0].conditions_done | int }} AS conditions_done,
          {{ validate_facility_results.rows[0].medications_done | int }} AS medications_done,
          {{ validate_facility_results.rows[0].vital_signs_done | int }} AS vital_signs_done,
          {{ validate_facility_results.rows[0].demographics_done | int }} AS demographics_done,
          {{ validate_facility_results.rows[0].assessments_queue_done | int }} AS assessments_queue_done,
          {{ validate_facility_results.rows[0].mds_expected | int }} AS mds_expected,
          {{ validate_facility_results.rows[0].mds_details_done | int }} AS mds_details_done;
      spec:
        policy:
          rules:
            - when: '{{ output.status == "error" }}'
              then:
                do: fail
            - else:
                then:
                  do: continue
    next:
      spec:
        mode: exclusive
      arcs:
        - step: log_facility_validation

  - step: log_facility_validation
    desc: |
      Write per-facility validation results to log table and print summary.
      References validate_facility_results step directly — avoids step-level input:
      scoping issues and ctx.facility_validation STATE-LOAD loss.
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        WITH upsert_validation AS (
          INSERT INTO public.pft_test_validation_log (
            execution_id, facility_mapping_id,
            assessments_done, conditions_done, medications_done,
            vital_signs_done, demographics_done, assessments_queue_done,
            mds_expected, mds_details_done, total_expected
          )
                  VALUES (
                    '{{ execution_id }}',
                    {{ assert_facility_validation_ready.rows[0].facility_mapping_id | int }},
                    {{ assert_facility_validation_ready.rows[0].assessments_done | int }},
                    {{ assert_facility_validation_ready.rows[0].conditions_done | int }},
                    {{ assert_facility_validation_ready.rows[0].medications_done | int }},
                    {{ assert_facility_validation_ready.rows[0].vital_signs_done | int }},
                    {{ assert_facility_validation_ready.rows[0].demographics_done | int }},
                    {{ assert_facility_validation_ready.rows[0].assessments_queue_done | int }},
                    {{ assert_facility_validation_ready.rows[0].mds_expected | int }},
                    {{ assert_facility_validation_ready.rows[0].mds_details_done | int }},
                    {{ workload.patients_per_facility | int }}
                  )
          ON CONFLICT (execution_id, facility_mapping_id) DO UPDATE SET
          assessments_done       = EXCLUDED.assessments_done,
          conditions_done        = EXCLUDED.conditions_done,
          medications_done       = EXCLUDED.medications_done,
          vital_signs_done       = EXCLUDED.vital_signs_done,
          demographics_done      = EXCLUDED.demographics_done,
          assessments_queue_done = EXCLUDED.assessments_queue_done,
          mds_expected           = EXCLUDED.mds_expected,
          mds_details_done       = EXCLUDED.mds_details_done,
          total_expected         = EXCLUDED.total_expected,
          logged_at              = NOW()
          RETURNING facility_mapping_id
        ),
        mark_processed AS (
          UPDATE public.pft_test_facilities
          SET active = FALSE, updated_at = NOW()
          WHERE facility_mapping_id = (SELECT facility_mapping_id FROM upsert_validation)
          RETURNING facility_mapping_id
        )
        SELECT
          'logged' AS status,
          (SELECT facility_mapping_id FROM mark_processed) AS facility_mapping_id,
          (SELECT COUNT(*) FROM public.pft_test_facilities WHERE active = TRUE) AS remaining_count;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: load_next_facility
          when: '{{ (output.data.rows[0].remaining_count | int) > 0 }}'
        - step: validate_all_results
          when: '{{ (output.data.rows[0].remaining_count | int) == 0 }}'
    set:
      ctx.remaining_count: '{{ output.data.rows[0].remaining_count }}'

  # ------------------------------------------------------------------
  # FINAL VALIDATION
  # ------------------------------------------------------------------
  - step: validate_all_results
    desc: Query final result tables and assert all facilities have 1000/1000 patients
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        WITH facilities AS (
          SELECT facility_mapping_id
          FROM public.pft_test_facilities
          ORDER BY facility_mapping_id
        ),
        assessments AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_assessments
          GROUP BY facility_mapping_id
        ),
        conditions AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_conditions
          GROUP BY facility_mapping_id
        ),
        medications AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_medications
          GROUP BY facility_mapping_id
        ),
        vital_signs AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_vital_signs
          GROUP BY facility_mapping_id
        ),
        demographics AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_demographics
          GROUP BY facility_mapping_id
        ),
        queue_assessments AS (
          SELECT facility_mapping_id, COUNT(DISTINCT patient_id) AS n
          FROM public.pft_test_patient_work_queue
          WHERE execution_id = '{{ execution_id }}'
            AND data_type = 'assessments'
            AND status = 'done'
          GROUP BY facility_mapping_id
        ),
        mds_expected AS (
          SELECT facility_mapping_id, COUNT(*) AS n
          FROM public.pft_test_mds_assessment_ids_work
          GROUP BY facility_mapping_id
        ),
        mds_done AS (
          SELECT facility_mapping_id, COUNT(*) AS n
          FROM public.pft_test_mds_assessment_details
          GROUP BY facility_mapping_id
        )
        SELECT
          f.facility_mapping_id,
          COALESCE(a.n, 0) AS assessments_done,
          COALESCE(c.n, 0) AS conditions_done,
          COALESCE(m.n, 0) AS medications_done,
          COALESCE(v.n, 0) AS vital_signs_done,
          COALESCE(d.n, 0) AS demographics_done,
          COALESCE(qa.n, 0) AS assessments_queue_done,
          COALESCE(me.n, 0) AS mds_expected,
          COALESCE(md.n, 0) AS mds_details_done,
          {{ workload.patients_per_facility | int }} AS total_expected,
          (COALESCE(a.n, 0) = {{ workload.patients_per_facility | int }}
           AND COALESCE(c.n, 0) = {{ workload.patients_per_facility | int }}
           AND COALESCE(m.n, 0) = {{ workload.patients_per_facility | int }}
           AND COALESCE(v.n, 0) = {{ workload.patients_per_facility | int }}
           AND COALESCE(d.n, 0) = {{ workload.patients_per_facility | int }}
           AND COALESCE(me.n, 0) = COALESCE(md.n, 0)) AS all_passed
        FROM facilities f
        LEFT JOIN assessments a ON a.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN conditions c ON c.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN medications m ON m.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN vital_signs v ON v.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN demographics d ON d.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN queue_assessments qa ON qa.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN mds_expected me ON me.facility_mapping_id = f.facility_mapping_id
        LEFT JOIN mds_done md ON md.facility_mapping_id = f.facility_mapping_id
        ORDER BY f.facility_mapping_id;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: check_results
  - step: check_results
    desc: |
      Assert all 10 facilities have 1000/1000 patients with ACTUAL data in result tables.
      If the 2.14.7 loop.done race bug is present, assessments_queue_done may be 1000
      but assessments_done will be << 1000 (only ~1 batch worth, due to premature cutoff).
    tool:
      kind: postgres
      auth: pg_k8s
      command: |
        DO $$
        DECLARE
          failure_count INTEGER;
          facility_count INTEGER;
        BEGIN
          WITH facilities AS (
            SELECT facility_mapping_id
            FROM public.pft_test_facilities
          ),
          assessments AS (
            SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
            FROM public.pft_test_patient_assessments
            GROUP BY facility_mapping_id
          ),
          conditions AS (
            SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
            FROM public.pft_test_patient_conditions
            GROUP BY facility_mapping_id
          ),
          medications AS (
            SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
            FROM public.pft_test_patient_medications
            GROUP BY facility_mapping_id
          ),
          vital_signs AS (
            SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
            FROM public.pft_test_patient_vital_signs
            GROUP BY facility_mapping_id
          ),
          demographics AS (
            SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
            FROM public.pft_test_patient_demographics
            GROUP BY facility_mapping_id
          ),
          queue_assessments AS (
            SELECT facility_mapping_id, COUNT(DISTINCT patient_id) AS n
            FROM public.pft_test_patient_work_queue
            WHERE execution_id = '{{ execution_id }}'
              AND data_type = 'assessments'
              AND status = 'done'
            GROUP BY facility_mapping_id
          ),
          mds_expected AS (
            SELECT facility_mapping_id, COUNT(*) AS n
            FROM public.pft_test_mds_assessment_ids_work
            GROUP BY facility_mapping_id
          ),
          mds_done AS (
            SELECT facility_mapping_id, COUNT(*) AS n
            FROM public.pft_test_mds_assessment_details
            GROUP BY facility_mapping_id
          ),
          validation AS (
            SELECT
              f.facility_mapping_id,
              COALESCE(a.n, 0) AS assessments_done,
              COALESCE(c.n, 0) AS conditions_done,
              COALESCE(m.n, 0) AS medications_done,
              COALESCE(v.n, 0) AS vital_signs_done,
              COALESCE(d.n, 0) AS demographics_done,
              COALESCE(qa.n, 0) AS assessments_queue_done,
              COALESCE(me.n, 0) AS mds_expected,
              COALESCE(md.n, 0) AS mds_details_done
            FROM facilities f
            LEFT JOIN assessments a ON a.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN conditions c ON c.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN medications m ON m.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN vital_signs v ON v.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN demographics d ON d.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN queue_assessments qa ON qa.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN mds_expected me ON me.facility_mapping_id = f.facility_mapping_id
            LEFT JOIN mds_done md ON md.facility_mapping_id = f.facility_mapping_id
          )
          SELECT
            COUNT(*),
            COUNT(*) FILTER (
              WHERE NOT (
                assessments_done = {{ workload.patients_per_facility | int }}
                AND conditions_done = {{ workload.patients_per_facility | int }}
                AND medications_done = {{ workload.patients_per_facility | int }}
                AND vital_signs_done = {{ workload.patients_per_facility | int }}
                AND demographics_done = {{ workload.patients_per_facility | int }}
                AND assessments_queue_done = {{ workload.patients_per_facility | int }}
                AND mds_expected = mds_details_done
              )
            )
          INTO facility_count, failure_count
          FROM validation;

          IF facility_count <> {{ workload.num_facilities | int }} THEN
            RAISE EXCEPTION 'Expected % facilities, got %', {{ workload.num_facilities | int }}, facility_count;
          END IF;

          IF failure_count > 0 THEN
            RAISE EXCEPTION 'Patient loss detected in % facility result(s)', failure_count;
          END IF;
        END $$;

        WITH facilities AS (
          SELECT facility_mapping_id
          FROM public.pft_test_facilities
        ),
        assessments AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_assessments
          GROUP BY facility_mapping_id
        ),
        conditions AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_conditions
          GROUP BY facility_mapping_id
        ),
        medications AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_medications
          GROUP BY facility_mapping_id
        ),
        vital_signs AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_vital_signs
          GROUP BY facility_mapping_id
        ),
        demographics AS (
          SELECT facility_mapping_id, COUNT(DISTINCT pcc_patient_id) AS n
          FROM public.pft_test_patient_demographics
          GROUP BY facility_mapping_id
        ),
        queue_assessments AS (
          SELECT facility_mapping_id, COUNT(DISTINCT patient_id) AS n
          FROM public.pft_test_patient_work_queue
          WHERE execution_id = '{{ execution_id }}'
            AND data_type = 'assessments'
            AND status = 'done'
          GROUP BY facility_mapping_id
        ),
        mds_expected AS (
          SELECT facility_mapping_id, COUNT(*) AS n
          FROM public.pft_test_mds_assessment_ids_work
          GROUP BY facility_mapping_id
        ),
        mds_done AS (
          SELECT facility_mapping_id, COUNT(*) AS n
          FROM public.pft_test_mds_assessment_details
          GROUP BY facility_mapping_id
        ),
        validation AS (
          SELECT
            f.facility_mapping_id,
            COALESCE(a.n, 0) AS assessments_done,
            COALESCE(c.n, 0) AS conditions_done,
            COALESCE(m.n, 0) AS medications_done,
            COALESCE(v.n, 0) AS vital_signs_done,
            COALESCE(d.n, 0) AS demographics_done,
            COALESCE(qa.n, 0) AS assessments_queue_done,
            COALESCE(me.n, 0) AS mds_expected,
            COALESCE(md.n, 0) AS mds_details_done
          FROM facilities f
          LEFT JOIN assessments a ON a.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN conditions c ON c.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN medications m ON m.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN vital_signs v ON v.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN demographics d ON d.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN queue_assessments qa ON qa.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN mds_expected me ON me.facility_mapping_id = f.facility_mapping_id
          LEFT JOIN mds_done md ON md.facility_mapping_id = f.facility_mapping_id
        )
        INSERT INTO public.pft_test_validation_log (
          execution_id,
          facility_mapping_id,
          assessments_done,
          conditions_done,
          medications_done,
          vital_signs_done,
          demographics_done,
          assessments_queue_done,
          mds_expected,
          mds_details_done,
          total_expected
        )
        SELECT
          '{{ execution_id }}',
          facility_mapping_id,
          assessments_done,
          conditions_done,
          medications_done,
          vital_signs_done,
          demographics_done,
          assessments_queue_done,
          mds_expected,
          mds_details_done,
          {{ workload.patients_per_facility | int }}
        FROM validation
        ON CONFLICT (execution_id, facility_mapping_id) DO UPDATE SET
          assessments_done = EXCLUDED.assessments_done,
          conditions_done = EXCLUDED.conditions_done,
          medications_done = EXCLUDED.medications_done,
          vital_signs_done = EXCLUDED.vital_signs_done,
          demographics_done = EXCLUDED.demographics_done,
          assessments_queue_done = EXCLUDED.assessments_queue_done,
          mds_expected = EXCLUDED.mds_expected,
          mds_details_done = EXCLUDED.mds_details_done,
          total_expected = EXCLUDED.total_expected,
          logged_at = NOW();

        SELECT
          'passed' AS status,
          {{ workload.num_facilities | int }} AS facilities_checked,
          {{ workload.patients_per_facility | int }} AS patients_per_facility,
          TRUE AS all_data_types_complete,
          TRUE AS mds_complete;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end
    set:
      ctx.final_check_status: '{{ output.data.rows[0].status }}'

  - step: end
    desc: PFT flow test complete — all facilities and patients processed
    tool:
      kind: postgres
      auth: pg_k8s
      query: |
        SELECT
          CASE WHEN '{{ ctx.final_check_status | default("unknown") }}' = 'passed'
            THEN 'completed'
            ELSE 'failed'
          END AS status,
          '{{ ctx.final_check_status | default("unknown") }}' AS check_status;

apiVersion: noetl.io/v2
kind: Playbook
metadata:
  name: spike_e2e_test
  path: tests/spike/spike_e2e_test
  description: |
    End-to-end smoke for the NoETL-as-AI-OS spike. Exercises all five
    gaps in a single execution:

    - **Gap 1** (`tool: agent framework=noetl`) — dispatches a peer
      sub-playbook as the agent runtime
    - **Gap 4.1** (auto-dispatch on failure) — `on_failure.troubleshoot:
      true` on the agent step, so when the sub-playbook fails the
      executor automatically invokes the troubleshoot agent against
      the failed sub-execution_id
    - **Gap 4** (self-troubleshoot agent) — the troubleshoot playbook
      itself runs, fetching the failed execution's events and
      classifying via Ollama
    - **Gap 5** (mcp/ollama bridge) — the troubleshoot agent's
      ollama_triage step calls the local Ollama bridge for first-pass
      classification
    - **Gap 3** (typed metadata) — `exposes_as_mcp: true` is validated
      at register time as the typed Pydantic field

    Gap 2 (playbook-as-MCP-server) is tested separately via curl in
    the runbook playbook (since it's an external-protocol surface,
    not a sub-flow callable).

    Returns the agent envelope from the failed sub-call. The diagnosis
    appears in `error.diagnosis` per the Gap 4.1 contract.

  exposes_as_mcp: true
  tags:
    - test
    - spike
    - e2e
    - ai-os

workload:
  # Pass-through to the troubleshoot agent's workload via `on_failure`.
  # `escalate_to: none` keeps the smoke fast and free — Ollama-only
  # path, no upstream API calls. Bump to 'openai' or 'claude' when
  # validating the escalation paths separately.
  # `triage_*` fields are canonical. Workers v2.36.0+ forward them
  # directly to the troubleshoot agent without deprecated ollama_* mirrors.
  triage_model: "gemma3:4b"
  triage_mcp_server: "mcp/ollama"
  noetl_url: "http://noetl.noetl.svc.cluster.local:8082"
  confidence_threshold: 0.0
  escalate_to: "none"

workflow:
  - step: resolve_triage_backend
    desc: Resolve canonical triage_* fields
    tool:
      kind: python
      code: |
        DEFAULT_SERVER = "mcp/ollama"
        DEFAULT_MODEL = "gemma3:4b"

        triage_server = str(triage_mcp_server or "").strip()
        triage_model_value = str(triage_model or "").strip()

        server = triage_server or DEFAULT_SERVER
        model = triage_model_value or DEFAULT_MODEL

        result = {
          "status": "ok",
          "server": server,
          "model": model,
        }
      args:
        triage_mcp_server: "{{ workload.triage_mcp_server }}"
        triage_model: "{{ workload.triage_model }}"
    next:
      arcs:
        - step: trigger_failure

  - step: trigger_failure
    desc: Dispatch a deliberately-failing sub-playbook via tool agent framework=noetl
    tool:
      kind: agent
      framework: noetl
      entrypoint: tests/spike/spike_failing_subflow
      payload: {}
      # Gap 4.1: opt in to auto-troubleshoot. When the sub-playbook
      # fails, the executor dispatches the troubleshoot agent against
      # the failed sub-execution_id and attaches the diagnosis to
      # error.diagnosis on the agent envelope.
      on_failure:
        troubleshoot: true
        triage_model: "{{ resolve_triage_backend.model }}"
        triage_mcp_server: "{{ resolve_triage_backend.server }}"
        noetl_url: "{{ workload.noetl_url }}"
        confidence_threshold: "{{ workload.confidence_threshold }}"
        escalate_to: "{{ workload.escalate_to }}"
    next:
      arcs:
        - step: extract_envelope

  - step: extract_envelope
    desc: Surface the agent envelope as a top-level result so the smoke can assert
    tool:
      kind: python
      code: |
        # `failed_envelope` is the agent envelope from trigger_failure.
        # We expect:
        #   - status: "error"
        #   - framework: "noetl"
        #   - error.kind: "agent.execution"
        #   - error.code: "PLAYBOOK_FAILED"
        #   - error.diagnosis: {...}  # Gap 4.1 hook attaches this
        import json
        import os
        import time
        import urllib.request

        envelope = failed_envelope if isinstance(failed_envelope, dict) else {}
        error_block = envelope.get("error") if isinstance(envelope.get("error"), dict) else {}
        diagnosis = error_block.get("diagnosis") if isinstance(error_block.get("diagnosis"), dict) else None
        diagnosis_lookup = {"attempts": 0, "status": "not-needed"}

        required = {"category", "confidence", "root_cause", "suggested_action", "source"}

        def _extract_persisted_diagnosis(doc):
          events = doc.get("events", []) if isinstance(doc, dict) else []
          for evt in events:
            if not isinstance(evt, dict):
              continue
            if evt.get("node_name") != "persist_diagnosis":
              continue
            if evt.get("event_type") not in ("command.completed", "step.exit", "call.done"):
              continue
            result_block = evt.get("result") if isinstance(evt.get("result"), dict) else {}
            ctx = result_block.get("context") if isinstance(result_block.get("context"), dict) else {}
            candidate = ctx.get("diagnosis") if isinstance(ctx.get("diagnosis"), dict) else None
            if candidate and {"category", "confidence", "root_cause", "suggested_action", "source"}.issubset(candidate.keys()):
              return candidate
          return None

        # The auto-troubleshoot hook dispatches the diagnosis playbook.
        # On async runtimes the envelope may initially contain only the
        # dispatch handle. For the e2e smoke, wait briefly and surface
        # the final persisted diagnosis so the assertion validates the
        # whole AI-OS path instead of the launch acknowledgement.
        if isinstance(diagnosis, dict) and not required.issubset(diagnosis.keys()):
          diag_id = diagnosis.get("execution_id")
          if diag_id:
            base = str(os.environ.get("NOETL_SERVER_URL") or noetl_url).rstrip("/")
            diagnosis_lookup = {"attempts": 0, "status": "waiting", "execution_id": diag_id, "base": base}
            for attempt in range(30):
              diagnosis_lookup["attempts"] = attempt + 1
              try:
                api_base = base if base.endswith("/api") else f"{base}/api"
                with urllib.request.urlopen(f"{api_base}/executions/{diag_id}", timeout=5) as resp:
                  doc = json.loads(resp.read().decode("utf-8"))
                diagnosis_lookup["last_status"] = doc.get("status")
                diagnosis_lookup["events"] = len(doc.get("events", []) if isinstance(doc.get("events"), list) else [])
                final_diagnosis = _extract_persisted_diagnosis(doc)
                if final_diagnosis:
                  diagnosis = final_diagnosis
                  diagnosis_lookup["status"] = "resolved"
                  break
              except Exception as exc:
                diagnosis_lookup["status"] = "error"
                diagnosis_lookup["error"] = str(exc)
              time.sleep(2)

        if diagnosis is None:
          base = str(os.environ.get("NOETL_SERVER_URL") or noetl_url).rstrip("/")
          diagnosis_lookup = {
            "attempts": 0,
            "status": "discovering-child-diagnosis",
            "parent_execution_id": parent_execution_id,
            "base": base,
          }
          for attempt in range(30):
            diagnosis_lookup["attempts"] = attempt + 1
            try:
              api_base = base if base.endswith("/api") else f"{base}/api"
              with urllib.request.urlopen(f"{api_base}/executions?limit=50", timeout=5) as resp:
                listing = json.loads(resp.read().decode("utf-8"))
              items = listing if isinstance(listing, list) else listing.get("items", [])
              diag_id = None
              for item in items:
                if not isinstance(item, dict):
                  continue
                if item.get("parent_execution_id") != parent_execution_id:
                  continue
                if item.get("path") != "automation/agents/troubleshoot/diagnose_execution":
                  continue
                diag_id = item.get("execution_id")
                break
              if diag_id:
                diagnosis_lookup["execution_id"] = diag_id
                with urllib.request.urlopen(f"{api_base}/executions/{diag_id}", timeout=5) as resp:
                  doc = json.loads(resp.read().decode("utf-8"))
                diagnosis_lookup["last_status"] = doc.get("status")
                diagnosis_lookup["events"] = len(doc.get("events", []) if isinstance(doc.get("events"), list) else [])
                final_diagnosis = _extract_persisted_diagnosis(doc)
                if final_diagnosis:
                  diagnosis = final_diagnosis
                  diagnosis_lookup["status"] = "resolved"
                  break
            except Exception as exc:
              diagnosis_lookup["status"] = "error"
              diagnosis_lookup["error"] = str(exc)
            time.sleep(2)

        result = {
          "status": "ok",
          "smoke_status": "ok",
          "agent_envelope": envelope,
          "diagnosis": diagnosis,
          "diagnosis_lookup": diagnosis_lookup,
          # Convenience fields the assertion script reads
          "summary": (
            "Spike e2e smoke completed; diagnosis "
            + ("attached" if diagnosis else "MISSING")
          ),
          "text": (
            "Spike e2e smoke completed; diagnosis "
            + ("attached" if diagnosis else "MISSING")
          ),
        }
      args:
        failed_envelope: "{{ trigger_failure }}"
        noetl_url: "{{ workload.noetl_url }}"
        parent_execution_id: "{{ execution_id }}"
    next:
      arcs:
        - step: end

  - step: end

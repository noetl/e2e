apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: http_to_postgres_simple
  path: fixtures/playbooks/data_transfer/http_to_postgres_simple

workload:
  pg_auth: pg_k8s
  message: Simple HTTP to PostgreSQL transfer example
  api_url: https://jsonplaceholder.typicode.com/posts

workflow:
  - step: start
    desc: Start HTTP to PostgreSQL transfer
    tool:
      kind: python
      input: {}
      code: |
        result = {"status": "initialized"}
    next:
      spec:
        mode: exclusive
      arcs:
        - step: fetch_posts

  - step: fetch_posts
    desc: Fetch posts from JSONPlaceholder API
    tool:
      kind: http
      method: GET
      url: "{{ api_url }}"
    next:
      spec:
        mode: exclusive
      arcs:
        - step: create_pg_table

  - step: create_pg_table
    desc: Create PostgreSQL table for posts
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        CREATE TABLE IF NOT EXISTS public.http_to_postgres_simple (
          id INTEGER PRIMARY KEY,
          user_id INTEGER,
          title TEXT,
          body TEXT
        );

        TRUNCATE TABLE public.http_to_postgres_simple;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: transform_and_execute

  - step: transform_and_execute
    desc: Transform first 3 posts and insert into PostgreSQL
    tool:
    - name: extract_posts
      kind: python
      input:
        input_data: "{{ fetch_posts }}"
      code: |
        """Extract first 3 posts as flat properties for template embedding."""
        if isinstance(input_data, dict):
            posts = input_data.get('data', [])
        elif isinstance(input_data, list):
            posts = input_data
        else:
            posts = []

        # Take up to 3 posts; escape single quotes for SQL
        out = {'count': min(len(posts), 3)}
        for i in range(3):
            p = posts[i] if i < len(posts) else {'id': 900+i, 'userId': 0, 'title': 'placeholder', 'body': 'placeholder'}
            out[f'id_{i}'] = p.get('id', 900+i)
            out[f'uid_{i}'] = p.get('userId', 0)
            out[f'title_{i}'] = str(p.get('title', '')).replace("'", "''")[:80]
            out[f'body_{i}'] = str(p.get('body', '')).replace("'", "''")[:120]
        result = out
      set:
        extracted: "{{ output }}"
    - name: insert_posts
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        INSERT INTO public.http_to_postgres_simple (id, user_id, title, body) VALUES
          ({{ extracted.id_0 }}, {{ extracted.uid_0 }}, '{{ extracted.title_0 }}', '{{ extracted.body_0 }}'),
          ({{ extracted.id_1 }}, {{ extracted.uid_1 }}, '{{ extracted.title_1 }}', '{{ extracted.body_1 }}'),
          ({{ extracted.id_2 }}, {{ extracted.uid_2 }}, '{{ extracted.title_2 }}', '{{ extracted.body_2 }}')
        ON CONFLICT (id) DO NOTHING;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: verify_data

  - step: verify_data
    desc: Verify data was inserted
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        SELECT
          COUNT(*) as total_posts,
          COUNT(DISTINCT user_id) as unique_users,
          MAX(id) as max_post_id
        FROM public.http_to_postgres_simple;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: show_sample

  - step: show_sample
    desc: Show sample posts
    tool:
      kind: postgres
      auth: "{{ pg_auth }}"
      command: |
        SELECT id, user_id, title, LEFT(body, 50) || '...' as body_preview
        FROM public.http_to_postgres_simple
        ORDER BY id
        LIMIT 5;
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: End HTTP to PostgreSQL transfer
    tool:
      kind: python
      input: {}
      code: |
        result = {"status": "completed"}

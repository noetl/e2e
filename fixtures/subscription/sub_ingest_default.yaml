# Default per-message target playbook (E2E fixture)
#
# noetl/ai-meta#90 Phase 2 — the playbook the continuous subscription
# runtime dispatches per message by default.  Runs on the dedicated
# `subscription` pool segment (the runtime sets execution_pool).  The
# message envelope arrives as the execution workload (payload_from:
# message.json merged a JSON body to the top level + the full envelope
# under `message`).
apiVersion: noetl.io/v2
kind: Playbook

metadata:
  name: sub_ingest_default
  path: tests/fixtures/sub_ingest_default
  description: |
    Records one ingested sensor reading.  The dedicated subscription
    pool drains the command, proving the firehose landed on
    noetl.commands.subscription.<eid> and not the shared stream.

workflow:
  - step: start
    desc: "Ingest one sensor reading dispatched by the subscription runtime"
    tool:
      kind: python
      input:
        device_id: "{{ workload.device_id | default('unknown') }}"
        reading: "{{ workload.reading | default(0) }}"
        message_id: "{{ workload.message.id | default('') }}"
        subscription: "{{ workload.subscription | default('') }}"
      code: |
        result = {
            "ingested": True,
            "via": "default",
            "device_id": input_data.get("device_id"),
            "reading": input_data.get("reading"),
            "message_id": input_data.get("message_id"),
        }
    next:
      spec:
        mode: exclusive
      arcs:
        - step: end

  - step: end
    desc: "Ingest complete"
    tool:
      kind: python
      input: {}
      code: |
        result = {"status": "done"}

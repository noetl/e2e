name: Publish test-server image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-test-server.yml"
      - "docker/test-server/Dockerfile"
      - "fixtures/servers/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/noetl/test-server
          tags: |
            type=sha,prefix=e2e-,format=short

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/test-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
